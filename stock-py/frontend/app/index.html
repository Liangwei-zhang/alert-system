                    localStorage.setItem(STORAGE_KEYS.pushDeviceId, generated);
                    return generated;
                },

                base64UrlToUint8Array(base64Url) {
                    const normalized = String(base64Url || '').trim();
                    const padding = '='.repeat((4 - (normalized.length % 4)) % 4);
                    const base64 = (normalized + padding).replace(/-/g, '+').replace(/_/g, '/');
                    const raw = window.atob(base64);
                    return Uint8Array.from(Array.from(raw).map((char) => char.charCodeAt(0)));
                },

                uint8ArrayToBase64Url(bytes) {
                    if (!(bytes instanceof Uint8Array) || bytes.length === 0) {
                        return '';
                    }
                    let binary = '';
                    bytes.forEach((value) => {
                        binary += String.fromCharCode(value);
                    });
                    return window.btoa(binary)
                        .replace(/\+/g, '-')
                        .replace(/\//g, '_')
                        .replace(/=+$/g, '');
                },

                bufferSourceToBase64Url(bufferSource) {
                    if (!bufferSource) {
                        return '';
                    }
                    if (bufferSource instanceof ArrayBuffer) {
                        return this.uint8ArrayToBase64Url(new Uint8Array(bufferSource));
                    }
                    if (ArrayBuffer.isView(bufferSource)) {
                        return this.uint8ArrayToBase64Url(
                            new Uint8Array(
                                bufferSource.buffer,
                                bufferSource.byteOffset,
                                bufferSource.byteLength,
                            )
                        );
                    }
                    return '';
                },

                subscriptionNeedsRebind(subscription, savedDevice, publicKey) {
                    if (!subscription) {
                        return Boolean(savedDevice);
                    }
                    if (savedDevice?.endpoint && subscription.endpoint !== savedDevice.endpoint) {
                        return true;
                    }
                    const subscriptionKey = this.bufferSourceToBase64Url(
                        subscription.options?.applicationServerKey,
                    );
                    if (subscriptionKey && publicKey && subscriptionKey !== publicKey) {
                        return true;
                    }
                    return false;
                },

                async loadPushConfig() {
                    if (!this.accessToken) {
                        this.pushConfigured = false;
                        this.pushPublicKey = '';
                        return { enabled: false, public_key: null, subject: null };
                    }
                    const payload = await this.requestApi('GET', '/v1/notifications/push-config', {
                        auth: true,
                    });
                    this.pushConfigured = Boolean(payload?.enabled && payload?.public_key);
                    this.pushPublicKey = payload?.public_key || '';
                    return payload || { enabled: false, public_key: null, subject: null };
                },

                async getPushRegistration() {
                    return await navigator.serviceWorker.register('/app/sw.js', { scope: '/app/' });
                },

                async refreshPushState() {
                    this.pushSupported = Boolean(
                        window.isSecureContext &&
                        'serviceWorker' in navigator &&
                        'PushManager' in window &&
                        'Notification' in window
                    );
                    this.pushPermission = this.pushSupported && window.Notification
                        ? Notification.permission
                        : 'unsupported';
                    this.pushEnabled = false;
                    this.pushServerId = '';

                    if (!this.pushSupported) {
                        this.pushConfigured = false;
                        this.pushStatus = window.location.protocol === 'file:'
                            ? '请通过 http://localhost:3000/app/ 打开页面，浏览器推送不支持 file://。'
                            : '当前浏览器或页面环境不支持 Web Push。';
                        return;
                    }
                    if (!this.accessToken) {
                        this.pushStatus = '登录后可启用浏览器推送。';
                        return;
                    }

                    try {
                        const config = await this.loadPushConfig();
                        if (!config?.enabled || !config?.public_key) {
                            this.pushStatus = '服务端尚未配置 Web Push。';
                            return;
                        }

                        const devices = await this.requestApi('GET', '/v1/notifications/push-devices', {
                            auth: true,
                        });
                        const matched = Array.isArray(devices)
                            ? devices.find((item) => item.device_id === this.getPushDeviceId())
                            : null;
                        let subscription = null;
                        if (matched || this.pushPermission === 'granted') {
                            const registration = await this.getPushRegistration();
                            subscription = await registration.pushManager.getSubscription();
                        }
                        if (this.subscriptionNeedsRebind(subscription, matched, config.public_key)) {
                            if (this.pushPermission === 'granted') {
                                this.pushStatus = '检测到推送密钥更新，正在重新绑定当前设备。';
                                await this.enablePush(false);
                                return;
                            }
                            this.pushStatus = '检测到推送配置已变更，请重新启用当前浏览器推送。';
                            return;
                        }
                        if (matched) {
                            this.pushEnabled = true;
                            this.pushServerId = matched.device_id || this.getPushDeviceId();
                            this.pushStatus = '当前浏览器已绑定推送设备。';
                            return;
                        }
                        if (this.pushPermission === 'granted') {
                            this.pushStatus = '浏览器已授权，正在同步当前设备。';
                            await this.enablePush(false);
                            return;
                        }
                        if (this.pushPermission === 'denied') {
                            this.pushStatus = '浏览器已拒绝通知权限，请在站点设置中重新开启。';
                            return;
                        }
                        this.pushStatus = '当前浏览器尚未启用推送。';
                    } catch (error) {
                        this.pushStatus = `推送状态读取失败: ${error.message}`;
                    }
                },

                async enablePush(interactive = true) {
                    if (this.pushBusy) {
                        return false;
                    }
                    if (!this.accessToken) {
                        if (interactive) {
                            this.showToast('请先登录后再启用推送。');
                        }
                        return false;
                    }
                    if (!window.isSecureContext || !('serviceWorker' in navigator) || !('PushManager' in window) || !('Notification' in window)) {
                        const message = '当前环境不支持浏览器推送，请使用 http://localhost:3000/app/。';
                        this.pushStatus = message;
                        if (interactive) {
                            this.showToast(message);
                        }
                        return false;
                    }

                    this.pushBusy = true;
                    try {
                        const config = await this.loadPushConfig();
                        if (!config?.enabled || !config?.public_key) {
                            throw new Error('服务端尚未配置 Web Push');
                        }

                        let permission = Notification.permission;
                        if (permission === 'default' && interactive) {
                            permission = await Notification.requestPermission();
                        }
                        this.pushPermission = permission;
                        if (permission !== 'granted') {
                            const message = permission === 'denied'
                                ? '浏览器已拒绝通知权限，请在站点设置中重新开启。'
                                : '需要先授权通知权限。';
                            this.pushStatus = message;
                            if (interactive) {
                                this.showToast(message);
                            }
                            return false;
                        }

                        const registration = await this.getPushRegistration();
                        let subscription = await registration.pushManager.getSubscription();
                        if (this.subscriptionNeedsRebind(subscription, null, config.public_key)) {
                            await subscription.unsubscribe();
                            subscription = null;
                        }
                        if (!subscription) {
                            subscription = await registration.pushManager.subscribe({
                                userVisibleOnly: true,
                                applicationServerKey: this.base64UrlToUint8Array(config.public_key),
                            });
                        }

                        const serialized = subscription.toJSON ? subscription.toJSON() : {};
                        const keys = serialized.keys || {};
                        const payload = {
                            device_id: this.getPushDeviceId(),
                            endpoint: subscription.endpoint,
                            provider: 'webpush',
                            public_key: keys.p256dh || '',
                            auth_key: keys.auth || '',
                            user_agent: navigator.userAgent || '',
                            locale: navigator.language || 'zh-CN',
                            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC',
                            extra: {
                                scope: registration.scope,
                                path: window.location.pathname,
                            },
                        };

                        const saved = await this.requestApi('POST', '/v1/notifications/push-devices', {
                            body: payload,
                            auth: true,
                        });
                        this.pushEnabled = true;
                        this.pushServerId = saved?.device_id || this.getPushDeviceId();
                        this.pushStatus = '当前浏览器已启用推送。';
                        if (interactive) {
                            this.showToast('浏览器推送已启用');
                        }
                        return true;
                    } catch (error) {
                        this.pushEnabled = false;
                        this.pushServerId = '';
                        this.pushStatus = error.message || '推送启用失败';
                        if (interactive) {
                            this.showToast(`推送启用失败：${this.pushStatus}`);
                        }
                        return false;
                    } finally {
                        this.pushBusy = false;
                    }
                },

                async sendPushTest() {
                    if (!this.accessToken) {
                        this.showToast('请先登录后再测试推送。');
                        return;
                    }
                    if (!this.pushServerId) {
                        const ready = await this.enablePush(false);
                        if (!ready || !this.pushServerId) {
                            this.showToast('当前浏览器尚未注册推送设备。');
                            return;
                        }
                    }

                    this.pushBusy = true;
                    try {
                        const result = await this.requestApi('POST', `/v1/notifications/push-devices/${this.pushServerId}/test`, {
                            auth: true,
                        });
                        if (result?.delivered) {
                            this.pushStatus = '测试推送已发送到当前浏览器。';
                            this.showToast('测试推送已发送');
                            return;
                        }
                        const message = result?.error || '测试推送失败';
                        this.pushStatus = message;
                        this.showToast(`测试推送失败：${message}`);
                    } catch (error) {
                        this.pushStatus = error.message || '测试推送失败';
                        this.showToast(`测试推送失败：${this.pushStatus}`);
                    } finally {
                        this.pushBusy = false;
                    }
                },

                inferMarketFromSymbol(symbol) {
                    const normalized = this.normalizeSymbol(symbol);
                    const resolved = this.resolveAsset(normalized);
                    if (resolved?.market) return resolved.market;
                    if (normalized.endsWith('.TO')) return 'CAD';
                    if (normalized.endsWith('USDT') || normalized.endsWith('USDC')) return 'CRYPTO';
                    return 'US';
                },

                resolveAssetDisplay(symbol) {
                    const resolved = this.resolveAsset(symbol);
                    const normalized = this.normalizeSymbol(symbol);
                    if (resolved) {
                        return {
                            symbol: this.normalizeSymbol(resolved.symbol),
                            name: resolved.name || normalized,
                            market: resolved.market || this.inferMarketFromSymbol(normalized),
                        };
                    }
                    return {
                        symbol: normalized,
                        name: normalized,
                        market: this.inferMarketFromSymbol(normalized),
                    };
                },

                parseObjectPayload(value) {
                    if (value && typeof value === 'object' && !Array.isArray(value)) {
                        return value;
                    }
                    if (typeof value !== 'string') {
                        return null;
                    }
                    try {
                        const parsed = JSON.parse(value);
                        return parsed && typeof parsed === 'object' && !Array.isArray(parsed) ? parsed : null;
                    } catch {
                        return null;
                    }
                },

                compactPercentLabel(value, options = {}) {
                    const amount = Number(value);
                    if (!Number.isFinite(amount)) {
                        return '--';
                    }
                    const pctValue = amount * 100;
                    const rounded = Math.abs(pctValue - Math.round(pctValue)) < 0.05
                        ? Math.round(pctValue)
                        : Number(pctValue.toFixed(1));
                    const prefix = options.signed
                        ? (rounded > 0 ? '+' : rounded < 0 ? '-' : '')
                        : '';
                    return `${prefix}${Math.abs(rounded)}%`;
                },

                emptyHoldingExitState() {
                    return {
                        hasPlan: false,
                        stageChips: [],
                        progressLabel: '',
                        nextLabel: '',
                        completedStages: 0,
                        totalStages: 0,
                        remainingShares: null,
                        baseShares: 0,
                    };
                },

                normalizeHoldingExitStage(stage, index) {
                    if (!stage || typeof stage !== 'object') {
                        return null;
                    }

                    const triggerPct = Number(stage.trigger_pct ?? stage.triggerPct);
                    const sellPct = Number(stage.sell_pct ?? stage.sellPct);
                    if (!Number.isFinite(triggerPct) || !Number.isFinite(sellPct)) {
                        return null;
                    }

                    const id = String(stage.id || `tp${index}`).trim() || `tp${index}`;
                    const label = String(stage.label || `Batch ${index}`).trim() || `Batch ${index}`;
                    return {
                        id,
                        label,
                        chipLabel: id.toUpperCase(),
                        triggerPct,
                        sellPct,
                        detail: `${this.compactPercentLabel(triggerPct, { signed: true })} · 卖${this.compactPercentLabel(sellPct)}`,
                    };
                },

                buildHoldingExitState(rawExtra, fallbackShares = 0) {
                    const payload = this.parseObjectPayload(rawExtra) || {};
                    const sellPlan = this.parseObjectPayload(payload.sell_plan) || {};
                    const sellProgress = this.parseObjectPayload(payload.sell_progress) || {};
                    const lastExit = this.parseObjectPayload(payload.last_exit) || this.parseObjectPayload(payload.lastExit) || {};

                    const normalizedStages = (Array.isArray(sellPlan.stages) ? sellPlan.stages : [])
                        .map((stage, index) => this.normalizeHoldingExitStage(stage, index + 1))
                        .filter(Boolean);
                    if (normalizedStages.length === 0) {
                        return this.emptyHoldingExitState();
                    }

                    const completedStageIds = (
                        Array.isArray(sellProgress.completed_stage_ids)
                            ? sellProgress.completed_stage_ids
                            : Array.isArray(sellProgress.completedStageIds)
                                ? sellProgress.completedStageIds
                                : []
                    )
                        .map((value) => String(value || '').trim())
                        .filter((value) => Boolean(value));
                    const completedStageIdSet = new Set(completedStageIds);
                    const completedStages = normalizedStages.filter((stage) => completedStageIdSet.has(stage.id));
                    const nextStage = normalizedStages.find((stage) => !completedStageIdSet.has(stage.id)) || null;

                    const shareCount = Number.isFinite(Number(fallbackShares))
                        ? Math.max(0, Math.round(Number(fallbackShares)))
                        : 0;
                    const baseSharesValue = Number(sellPlan.base_shares ?? sellPlan.baseShares ?? shareCount);
                    const baseShares = Number.isFinite(baseSharesValue) && baseSharesValue > 0
                        ? Math.max(Math.round(baseSharesValue), shareCount)
                        : shareCount;
                    const remainingSharesValue = Number(lastExit.remaining_shares ?? lastExit.remainingShares);
                    const remainingShares = Number.isFinite(remainingSharesValue)
                        ? Math.max(0, Math.round(remainingSharesValue))
                        : shareCount;

                    return {
                        hasPlan: true,
                        stageChips: normalizedStages.map((stage) => ({
                            id: stage.id,
                            label: stage.chipLabel,
                            detail: stage.detail,
                        })),
                        progressLabel: completedStages.length > 0
                            ? `已完成 ${completedStages.length}/${normalizedStages.length} 段，当前剩余 ${remainingShares} 股`
                            : `已建立 ${normalizedStages.length} 段退出计划，基准仓位 ${baseShares} 股`,
                        nextLabel: nextStage
                            ? `下一段 ${nextStage.label}：浮盈 ${this.compactPercentLabel(nextStage.triggerPct, { signed: true })} 时减仓 ${this.compactPercentLabel(nextStage.sellPct)}`
                            : `分批退出计划已全部执行${remainingShares > 0 ? `，当前剩余 ${remainingShares} 股` : ''}`,
                        completedStages: completedStages.length,
                        totalStages: normalizedStages.length,
                        remainingShares,
                        baseShares,
                    };
                },

                buildHoldingViewModel(item) {
                    const symbol = this.normalizeSymbol(item?.symbol || '');
                    const display = this.resolveAssetDisplay(symbol);
                    const shares = Number(item?.shares || 0);
                    return {
                        symbol: display.symbol,
                        name: display.name,
                        market: display.market,
                        shares,
                        avg_cost: Number(item?.avg_cost || 100),
                        exit_state: this.buildHoldingExitState(item?.extra, shares),
                    };
                },

                buildLocalHolding(symbol, shares, avgCost) {
                    const display = this.resolveAssetDisplay(symbol);
                    return {
                        symbol: this.normalizeSymbol(display.symbol),
                        name: display.name,
                        market: display.market,
                        shares,
                        avg_cost: avgCost,
                        exit_state: this.emptyHoldingExitState(),
                    };
                },

                async loadBackendSnapshot() {
                    if (!this.accessToken) {
                        this.backendConnected = false;
                        return false;
                    }
                    this.backendLoading = true;
                    this.backendError = '';

                    try {
                        const profile = await this.requestApi('GET', '/v1/account/profile');
                        const [dashboard, portfolio, watchlist] = await Promise.all([
                            this.requestApi('GET', '/v1/account/dashboard'),
                            this.requestApi('GET', '/v1/portfolio'),
                            this.requestApi('GET', '/v1/watchlist'),
                        ]);

                        this.backendSnapshot = {
                            profile,
                            dashboard,
                            portfolio: Array.isArray(portfolio) ? portfolio : [],
                            watchlist: Array.isArray(watchlist) ? watchlist : [],
                            notifications: this.notificationItems(),
                        };
                        await this.loadLocalNotifications(true);
                        this.backendConnected = true;
                        this.lastBackendSyncAt = new Date().toISOString();
                        this.applyBackendSnapshotToDraft();
                        return true;
                    } catch (error) {
                        this.backendConnected = false;
                        if (error?.status === 401) {
                            this.clearSession();
                            this.backendError = '登录状态已失效，请重新获取验证码并登录。';
                            this.showToast('登录状态已失效，请重新登录。');
                        } else {
                            this.backendError = `后台请求失败: ${error.message}`;
                        }
                        return false;
                    } finally {
                        this.backendLoading = false;
                    }
                },

                applyBackendSnapshotToDraft() {
                    const dashboardAccount = this.backendSnapshot.dashboard?.account;
                    if (dashboardAccount && Number.isFinite(Number(dashboardAccount.total_capital))) {
                        this.cash = String(Math.round(Number(dashboardAccount.total_capital)));
                    }

                    const portfolioItems = Array.isArray(this.backendSnapshot.portfolio)
                        ? this.backendSnapshot.portfolio
                        : [];
                    this.holdings = portfolioItems.map((item) => this.buildHoldingViewModel(item));

                    const watchlistItems = Array.isArray(this.backendSnapshot.watchlist)
                        ? this.backendSnapshot.watchlist
                        : [];
                    this.subscriptions = watchlistItems.map((item) => {
                        const symbol = this.normalizeSymbol(item.symbol || '');
                        const display = this.resolveAssetDisplay(symbol);
                        return {
                            symbol: display.symbol,
                            name: display.name,
                            market: display.market,
                        };
                    });
                },

                formatNumber(value, currency = 'USD') {
                    const amount = Number(value);
                    if (!Number.isFinite(amount)) {
                        return '--';
                    }
                    try {
                        return new Intl.NumberFormat('en-US', {
                            style: 'currency',
                            currency: currency || 'USD',
                            maximumFractionDigits: 2,
                        }).format(amount);
                    } catch {
                        return `${amount.toFixed(2)} ${currency || ''}`.trim();
                    }
                },

                formatTime(value) {
                    if (!value) {
                        return '尚未同步';
                    }
                    const date = new Date(value);
                    if (Number.isNaN(date.getTime())) {
                        return String(value);
                    }
                    return date.toLocaleString();
                },

                initOfflineData() {
                    const payload = window.OFFLINE_MARKET_DATA || {};
                    const universe = Array.isArray(payload) ? payload : (payload.universe || []);
                    const stats = Array.isArray(payload) ? this.computeOfflineStats(universe) : (payload.stats || this.computeOfflineStats(universe));

                    this.offlineUniverse = universe;
                    this.offlineSymbolMap = {};
                    this.offlineAliasMap = {};

                    for (const asset of universe) {
                        const symbol = this.normalizeSymbol(asset.symbol || '');
                        if (!symbol) continue;
                        this.offlineSymbolMap[symbol] = asset;
                        const aliases = Array.isArray(asset.aliases) ? asset.aliases : [];
                        for (const rawAlias of aliases) {
                            const alias = this.normalizeSymbol(rawAlias || '');
                            if (alias && !this.offlineAliasMap[alias]) {
                                this.offlineAliasMap[alias] = symbol;
                            }
                        }
                    }

                    this.offlineStats = {
                        total: universe.length,
                        US: stats.US || 0,
                        CAD: stats.CAD || 0,
                        CRYPTO: stats.CRYPTO || 0
                    };
                },

                computeOfflineStats(universe) {
                    const stats = { US: 0, CAD: 0, CRYPTO: 0 };
                    for (const asset of universe) {
                        if (asset && stats[asset.market] !== undefined) {
                            stats[asset.market] += 1;
                        }
                    }
                    return stats;
                },

                seedDefaultAssets() {
                    const seededHoldings = [];
                    const seededSubscriptions = [];

                    const holdingDefaults = [
                        { symbol: 'AAPL', shares: 100, avg_cost: 100 },
                        { symbol: 'RY.TO', shares: 150, avg_cost: 100 },
                        { symbol: 'BTCUSDT', shares: 1, avg_cost: 30000 }
                    ];
                    for (const item of holdingDefaults) {
                        const asset = this.resolveAsset(item.symbol);
                        if (asset) {
                            seededHoldings.push(this.buildLocalHolding(asset.symbol, item.shares, item.avg_cost));
                        }
                    }

                    const subDefaults = ['TSLA', 'ENB.TO', 'ETHUSDT'];
                    for (const symbol of subDefaults) {
                        const asset = this.resolveAsset(symbol);
                        if (asset) {
                            seededSubscriptions.push({
                                symbol: this.normalizeSymbol(asset.symbol),
                                name: asset.name,
                                market: asset.market
                            });
                        }
                    }

                    if (seededHoldings.length > 0) {
                        this.holdings = seededHoldings;
                    }
                    if (seededSubscriptions.length > 0) {
                        this.subscriptions = seededSubscriptions;
                    }
                },

                normalizeSymbol(value) {
                    return String(value || '').trim().toUpperCase().replace(/\s+/g, '');
                },

                resolveAsset(rawSymbol) {
                    const normalized = this.normalizeSymbol(rawSymbol);
                    if (!normalized) return null;

                    // Exact symbol has highest priority.
                    if (this.offlineSymbolMap[normalized]) {
                        return this.offlineSymbolMap[normalized];
                    }

                    const canonical = this.offlineAliasMap[normalized];
                    if (canonical && this.offlineSymbolMap[canonical]) {
                        return this.offlineSymbolMap[canonical];
                    }
                    return null;
                },

                marketLabel(market) {
                    if (market === 'US') return '美股';
                    if (market === 'CAD') return '加股';
                    if (market === 'CRYPTO') return '数字货币';
                    return market || '未知';
                },

                searchAssets(query, limit = 10) {
                    const normalized = this.normalizeSymbol(query);
                    if (!normalized) return [];

                    const plainQuery = !normalized.includes('.TO');
                    const scored = [];

                    for (const asset of this.offlineUniverse) {
                        const symbol = this.normalizeSymbol(asset.symbol || '');
                        if (!symbol) continue;

                        const name = String(asset.name || '').toUpperCase();
                        const aliases = Array.isArray(asset.aliases) ? asset.aliases : [];
                        const normalizedAliases = aliases.map((alias) => this.normalizeSymbol(alias));

                        let rank = null;
                        if (symbol === normalized) {
                            rank = 0;
                        } else if (normalizedAliases.some((alias) => alias === normalized)) {
                            rank = 1;
                        } else if (symbol.startsWith(normalized)) {
                            rank = 2;
                        } else if (normalizedAliases.some((alias) => alias.startsWith(normalized))) {
                            rank = 3;
                        } else if (name.includes(normalized)) {
                            rank = 4;
                        } else if (symbol.includes(normalized) || normalizedAliases.some((alias) => alias.includes(normalized))) {
                            rank = 5;
                        }

                        if (rank === null) continue;

                        // For plain query, prefer US primary symbol when .TO and US overlap.
                        if (
                            plainQuery &&
                            symbol.endsWith('.TO') &&
                            this.offlineSymbolMap[symbol.slice(0, -3)]
                        ) {
                            rank += 1;
                        }
                        if (plainQuery && asset.market === 'US') {
                            rank -= 0.25;
                        }

                        scored.push({
                            asset,
                            rank,
                            symbolLength: symbol.length,
                        });
                    }

                    scored.sort((a, b) => {
                        if (a.rank !== b.rank) return a.rank - b.rank;
                        if (a.symbolLength !== b.symbolLength) return a.symbolLength - b.symbolLength;
                        return a.asset.symbol.localeCompare(b.asset.symbol);
                    });

                    return scored.slice(0, limit).map((item) => item.asset);
                },

                updateSuggestions(field) {
                    if (field === 'holding') {
                        this.holdingSuggestions = this.searchAssets(this.newHoldSym, 8);
                        return;
                    }
                    this.subSuggestions = this.searchAssets(this.newSubSym, 10);
                },

                clearSuggestionsLater(field) {
                    setTimeout(() => {
                        if (field === 'holding') {
                            this.holdingSuggestions = [];
                        } else {
                            this.subSuggestions = [];
                        }
                    }, 120);
                },

                pickSuggestion(field, symbol) {
                    const selectByQuery = (query, selectedSymbol) => {
                        const normalizedQuery = this.normalizeSymbol(query);
                        const normalizedSelected = this.normalizeSymbol(selectedSymbol);
                        if (
                            normalizedSelected.endsWith('.TO') &&
                            !normalizedQuery.includes('.TO')
                        ) {
                            const usCandidate = normalizedSelected.slice(0, -3);
                            if (this.offlineSymbolMap[usCandidate]) {
                                return usCandidate;
                            }
                        }
                        return normalizedSelected;
                    };

                    if (field === 'holding') {
                        this.newHoldSym = selectByQuery(this.newHoldSym, symbol);
                        this.holdingSuggestions = [];
                        return;
                    }
                    this.newSubSym = selectByQuery(this.newSubSym, symbol);
                    this.subSuggestions = [];
                },

                async sendCode() {
                    const email = String(this.email || '').trim().toLowerCase();
                    if (!email) {
                        this.showToast('请输入邮箱地址');
                        return;
                    }
                    if (this.sendCodeBusy) {
                        return;
                    }
                    if (this.sendCodeCooldownSeconds > 0) {
                        this.showToast(`发送过于频繁，请 ${this.sendCodeCooldownSeconds} 秒后重试`);
                        return;
                    }
                    this.sendCodeBusy = true;
                    try {
                        const result = await this.requestApi('POST', '/v1/auth/send-code', {
                            body: { email },
                            auth: false,
                            retry: false,
                        });
                        this.startSendCodeCooldown(60);
                        if (result?.dev_code) {
                            this.code = result.dev_code;
                            this.showToast(`验证码已生成，开发码 ${result.dev_code}`);
                            return;
                        }
                        this.showToast(result?.message || '验证码已发送，请查收');
                    } catch (error) {
                        if (Number(error?.status) === 429) {
                            const cooldownSeconds = this.extractCooldownSeconds(error?.message, 60);
                            this.startSendCodeCooldown(cooldownSeconds);
                            this.showToast(`发送过于频繁，请 ${cooldownSeconds} 秒后重试`);
                            return;
                        }
                        this.showToast(`发送失败：${error.message}`);
                    } finally {
                        this.sendCodeBusy = false;
                    }
                },

                async login() {
                    const email = String(this.email || '').trim().toLowerCase();
                    const code = String(this.code || '').trim();
                    if (!email || code.length !== 6) {
                        this.showToast('请输入邮箱和6位验证码');
                        return;
                    }

                    const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC';
                    const locale = navigator.language || 'zh-CN';

                    try {
                        const sessionPayload = await this.requestApi('POST', '/v1/auth/verify', {
                            body: { email, code, locale, timezone },
                            auth: false,
                            retry: false,
                        });
                        this.persistSession(sessionPayload);
                        const connected = await this.loadBackendSnapshot();
                        if (!this.accessToken) {
                            this.showToast('登录会话已失效，请重新登录');
                            return;
                        }
                        const isSubActive = this.backendSnapshot?.dashboard?.subscription?.status === 'active';
                        this.step = isSubActive ? 'active' : 'construct';
                        this.routeIntent = this.parseRouteIntent();
                        if (isSubActive) {
                            this.applyRouteIntent();
                        } else {
                            this.switchActivePanel('overview', { syncUrl: false });
                        }
                        await this.refreshPushState();
                        this.showToast(connected ? '登录成功，已连接后台' : '登录成功，后台暂不可用，可稍后刷新');
                    } catch (error) {
                        this.showToast(`登录失败：${error.message}`);
                    }
                },

                addHolding() {
                    const normalizedInput = this.normalizeSymbol(this.newHoldSym);
                    const shares = parseInt(this.newHoldVol, 10);
                    if (!normalizedInput) {
                        this.showToast('请输入股票代码。');
                        return;
                    }
                    if (!Number.isFinite(shares) || shares <= 0) {
                        this.showToast('请输入有效股数。');
                        return;
                    }

                    const avgCostInput = Number.parseFloat(this.newHoldCost);
                    const avgCost = Number.isFinite(avgCostInput) && avgCostInput > 0 ? avgCostInput : 100;
                    const display = this.resolveAssetDisplay(normalizedInput);

                    const symbol = this.normalizeSymbol(display.symbol);
                    const existing = this.holdings.find((item) => item.symbol === symbol);
                    if (existing) {
                        existing.shares += shares;
                        existing.avg_cost = avgCost;
                        existing.exit_state = this.emptyHoldingExitState();
                    } else {
                        this.holdings.push(this.buildLocalHolding(symbol, shares, avgCost));
                    }

                    this.newHoldSym = '';
                    this.newHoldVol = '';
                    this.newHoldCost = '';
                    this.holdingSuggestions = [];
                    this.showToast('已写入本地离线持仓。');
                },
                removeHolding(idx) {
                    this.holdings.splice(idx, 1);
                },

                addSub() {
                    const normalizedInput = this.normalizeSymbol(this.newSubSym);
                    if (!normalizedInput) {
                        this.showToast('请输入订阅代码。');
                        return;
                    }

                    const display = this.resolveAssetDisplay(normalizedInput);

                    const symbol = this.normalizeSymbol(display.symbol);
                    const exists = this.subscriptions.some((item) => item.symbol === symbol);
                    if (exists) {
                        this.showToast('该标的已在订阅列表中。');
                        return;
                    }

                    this.subscriptions.push({
                        symbol,
                        name: display.name,
                        market: display.market
                    });
                    this.newSubSym = '';
                    this.subSuggestions = [];
                    this.showToast('已写入本地离线订阅。');
                },
                removeSub(idx) {
                    this.subscriptions.splice(idx, 1);
                },

                planLimits(plan) {
                    const normalized = String(plan || '').toLowerCase();
                    const watchlistLimits = { free: 5, pro: 10, max: 20, premium: 20 };
                    const portfolioLimits = { free: 3, pro: 6, max: 12, premium: 12 };
                    return {
                        watchlist: watchlistLimits[normalized] ?? 10,
                        portfolio: portfolioLimits[normalized] ?? 3,
                    };
                },

                buildStartSubscriptionPayload() {
                    const totalCapital = Number(this.cash);
                    if (!Number.isFinite(totalCapital) || totalCapital <= 0) {
                        throw new Error('请输入有效现金金额。');
                    }

                    const limits = this.planLimits(this.currentUser?.plan);
                    const watchlist = this.subscriptions
                        .map((item) => this.normalizeSymbol(item.symbol))
                        .filter((symbol) => Boolean(symbol))
                        .map((symbol) => ({
                            symbol,
                            min_score: 65,
                            notify: true,
                        }));
                    if (watchlist.length === 0) {
                        throw new Error('请至少添加1个订阅标的。');
                    }
                    if (watchlist.length > limits.watchlist) {
                        throw new Error(`当前套餐最多支持 ${limits.watchlist} 个订阅标的。`);
                    }

                    const portfolio = this.holdings
                        .map((item) => ({
                            symbol: this.normalizeSymbol(item.symbol),
                            shares: Number.parseInt(item.shares, 10),
                            avg_cost: Number.parseFloat(item.avg_cost),
                        }))
                        .filter((item) => item.symbol && Number.isFinite(item.shares) && item.shares > 0)
                        .map((item) => ({
                            symbol: item.symbol,
                            shares: item.shares,
                            avg_cost: Number.isFinite(item.avg_cost) && item.avg_cost > 0 ? item.avg_cost : 100,
                            target_profit: 0.15,
                            stop_loss: 0.08,
                            notify: true,
                        }));
                    if (portfolio.length > limits.portfolio) {
                        throw new Error(`当前套餐最多支持 ${limits.portfolio} 个持仓。`);
                    }

                    return {
                        allow_empty_portfolio: portfolio.length === 0,
                        account: {
                            total_capital: totalCapital,
                            currency: 'USD',
                        },
                        watchlist,
                        portfolio,
                    };
                },

                async syncData() {
                    if (!this.accessToken) {
                        this.showToast('请先完成登录并连接后台。');
                        return;
                    }

                    let payload;
                    try {
                        payload = this.buildStartSubscriptionPayload();
                    } catch (error) {
                        this.showToast(error.message || '数据校验失败');
                        return;
                    }

                    this.backendLoading = true;
                    try {
                        const result = await this.requestApi('POST', '/v1/account/start-subscription', {
                            body: payload,
                            auth: true,
                        });
                        this.step = 'active';
                        this.routeIntent = this.parseRouteIntent();
                        await this.loadBackendSnapshot();
                        this.applyRouteIntent();
                        await this.refreshPushState();
                        this.showToast(result?.message || '配置已同步至后台，监控已开启');
                    } catch (error) {
                        this.showToast(`同步失败：${error.message}`);
                    } finally {
                        this.backendLoading = false;
                    }
                },

                showToast(msg) {
                    this.toast = String(msg || '');
                    if (this.toastTimer) {
                        clearTimeout(this.toastTimer);
                    }
                    this.toastTimer = setTimeout(() => {
                        this.toast = '';
                        this.toastTimer = null;
                    }, 2600);
                }
            }
        }
    </script>
