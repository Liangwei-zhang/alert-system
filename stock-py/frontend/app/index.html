<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Alpha 极简智投</title>
    <!-- Production Tailwind CSS bundle -->
    <link rel="stylesheet" href="./tailwind.generated.css">
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        :root {
            --app-bg-a: #f3f8ff;
            --app-bg-b: #f8fbfd;
            --app-bg-c: #fff8f3;
            --app-surface-border: #e8eef8;
            --app-surface-shadow: 0 8px 22px rgba(15, 23, 42, 0.04);
        }
        body { 
            -webkit-tap-highlight-color: transparent; 
            background: linear-gradient(165deg, var(--app-bg-a) 0%, var(--app-bg-b) 52%, var(--app-bg-c) 100%);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .safe-pb { padding-bottom: env(safe-area-inset-bottom, 16px); }
        .safe-pt { /* padding-top: env(safe-area-inset-top, 44px); */ }
        .pt-4 { padding-bottom: 1rem; }
        .pt-6 { padding-top: 1rem; }
        .app-shell {
            background: linear-gradient(180deg, #ffffff 0%, #fbfdff 58%, #fffdfa 100%);
        }
        .app-login-soft {
            background: linear-gradient(180deg, #ffffff 0%, #f6faff 100%);
        }
        .app-construct {
            background: linear-gradient(180deg, #f8fbff 0%, #f8fbfc 45%, #fffaf5 100%);
        }
        .app-header-soft {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.98) 0%, rgba(246, 250, 255, 0.92) 100%);
            border-bottom: 1px solid #e8eef7;
        }
        .app-surface {
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid var(--app-surface-border);
            box-shadow: var(--app-surface-shadow);
        }
        .app-count-pill {
            background: #eef3ff;
            color: #5f6888;
        }
        .app-top-offset {
            top: 14px;
        }
        .app-sync-pad {
            padding: 0.5rem 1rem;
        }
        .app-bottom-bar {
            background: rgba(248, 251, 255, 0.86);
            border-top-color: #e7edf8;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        [x-cloak] { display: none !important; }
        
        /* Smooth transitions */
        .fade-enter-active, .fade-leave-active { transition: opacity 0.3s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
        
        /* iOS style inputs */
        input { appearance: none; outline: none; }
        input:focus { ring: 0; outline: none; }
    </style>
</head>
<body class="text-gray-900 overflow-hidden" x-data="appData()" x-init="initApp()">
    
    <!-- Mobile App Container -->
    <div class="w-full max-w-md mx-auto app-shell h-screen flex flex-col relative shadow-sm overflow-hidden">
        
        <!-- Toast Notification -->
        <div x-show="toast" x-transition x-cloak class="absolute top-12 left-0 right-0 z-50 flex justify-center safe-pt pointer-events-none">
            <div class="bg-gray-900 text-white px-4 py-2 rounded-full text-sm font-medium shadow-lg" x-text="toast"></div>
        </div>

        <!-- ==================== STEP 1: LOGIN ==================== -->
        <div x-show="step === 'login'" x-transition.opacity class="flex-1 flex flex-col px-6 safe-pt app-login-soft z-10 relative">
            <div class="mt-16 mb-12">
                <div class="w-12 h-12 bg-brand text-white rounded-2xl flex items-center justify-center text-xl font-bold mb-6">A</div>
                <h1 class="text-3xl font-extrabold tracking-tight">欢迎回来</h1>
                <p class="text-gray-500 mt-2 text-sm">请输入您的邮箱以登录或注册您的订阅账户</p>
            </div>

            <div class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">邮箱地址</label>
                    <input type="email" x-model="email" placeholder="name@example.com" 
                           class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3.5 text-[15px] focus:bg-white focus:border-brand transition-colors">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">验证码</label>
                    <div class="flex gap-3">
                        <input type="number" x-model="code" placeholder="6位数字" 
                               class="flex-1 bg-gray-50 border border-gray-200 rounded-xl px-4 py-3.5 text-[15px] focus:bg-white focus:border-brand transition-colors">
                        <button @click="sendCode()" class="shrink-0 px-4 bg-gray-100 text-gray-700 font-medium rounded-xl text-sm active:bg-gray-200 transition-colors">获取验证码</button>
                    </div>
                </div>
            </div>

            <div class="mt-auto safe-pb pb-6 pt-4">
                <button @click="login()" 
                        :class="email && code ? 'bg-brand text-white shadow-md' : 'bg-gray-100 text-gray-400 cursor-not-allowed'"
                        class="w-full py-4 rounded-2xl font-bold text-[15px] transition-all active:scale-[0.98]">
                    安全登录并连接后台
                </button>
            </div>
        </div>

        <!-- ==================== STEP 2: CONSTRUCT (Offline First) ==================== -->
        <div x-show="step === 'construct'" x-transition.opacity x-cloak class="flex-1 flex flex-col relative app-construct z-20 h-full">
            
            <header class="px-5 safe-pt pb-4 sticky app-top-offset app-header-soft z-30">
                <h1 class="text-xl font-extrabold tracking-tight">订阅配置</h1>
                <p class="mt-1 text-xs text-gray-500" x-text="backendConnected ? '后台已连接，当前录入将同步到服务器。' : '当前离线草稿模式，登录后可一键同步到后台。'"></p>
            </header>

            <main class="flex-1 overflow-y-auto no-scrollbar px-5 py-6 pb-32 space-y-8">
                
                <!-- Core Input 1: Cash -->
                <section class="app-surface rounded-3xl p-5">
                    <div class="flex items-center gap-2 mb-4">
                        <div class="w-8 h-8 rounded-full bg-blue-50 text-accent flex items-center justify-center"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></div>
                        <h2 class="font-bold text-[15px]">当前可用现金</h2>
                    </div>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-medium">¥</span>
                        <input type="number" x-model="cash" class="w-full bg-gray-50 border border-gray-100 rounded-2xl pl-8 pr-4 py-4 text-xl font-bold focus:bg-white focus:border-gray-200 transition-colors" placeholder="0.00">
                    </div>
                </section>

                <!-- Core Input 2: Holdings -->
                <section class="app-surface rounded-3xl p-5">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 rounded-full bg-emerald-50 text-emerald-600 flex items-center justify-center"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path></svg></div>
                            <h2 class="font-bold text-[15px]">已持仓股票</h2>
                        </div>
                        <span class="text-xs px-2 py-1 rounded-md font-medium app-count-pill" x-text="holdings.length + ' 只'"></span>
                    </div>

                    <!-- List -->
                    <div class="space-y-2 mb-4">
                        <template x-for="(item, idx) in holdings" :key="idx">
                            <div class="flex items-center justify-between px-4 py-3 bg-gray-50 rounded-xl">
                                <div>
                                    <div class="font-semibold text-[15px]" x-text="item.symbol"></div>
                                    <div class="text-[11px] text-gray-400" x-text="item.name"></div>
                                </div>
                                <div class="flex items-center gap-3">
                                    <div class="text-[10px] px-2 py-0.5 rounded bg-white border border-gray-200 text-gray-500" x-text="marketLabel(item.market)"></div>
                                    <div class="text-sm text-gray-500"><span x-text="item.shares"></span> 股 / $<span x-text="Number(item.avg_cost || 0).toFixed(2)"></span></div>
                                    <button @click="removeHolding(idx)" class="text-gray-300 hover:text-red-500"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M6 18L18 6M6 6l12 12"></path></svg></button>
                                </div>
                            </div>
                        </template>
                        <div x-show="holdings.length === 0" class="text-center py-4 text-xs text-gray-400">暂无持仓</div>
                    </div>

                    <!-- Add New Holding -->
                    <div class="flex gap-2">
                        <div class="w-1/2 relative">
                            <input type="text" x-model="newHoldSym" @input="updateSuggestions('holding')" @focus="updateSuggestions('holding')" @blur="clearSuggestionsLater('holding')" placeholder="代码(如 AAPL / RY.TO / BTCUSDT)" class="w-full bg-gray-50 border border-gray-100 rounded-xl px-3 py-2.5 text-sm uppercase">
                            <div x-show="holdingSuggestions.length > 0" x-cloak class="absolute z-40 mt-1 w-full max-h-48 overflow-y-auto rounded-xl border border-gray-200 bg-white shadow-lg">
                                <template x-for="asset in holdingSuggestions" :key="asset.symbol">
                                    <button type="button" @mousedown.prevent="pickSuggestion('holding', asset.symbol)" class="w-full px-3 py-2 text-left hover:bg-gray-50 active:bg-gray-100">
                                        <div class="flex items-center justify-between gap-2">
                                            <span class="text-xs font-semibold text-gray-800" x-text="asset.symbol"></span>
                                            <span class="text-[10px] text-gray-500" x-text="marketLabel(asset.market)"></span>
                                        </div>
                                        <div class="text-[10px] text-gray-400 truncate" x-text="asset.name"></div>
                                    </button>
                                </template>
                            </div>
                        </div>
                        <input type="number" x-model="newHoldVol" placeholder="股数" class="w-1/2 bg-gray-50 border border-gray-100 rounded-xl px-3 py-2.5 text-sm">
                        <button @click="addHolding()" class="shrink-0 w-10 h-10 bg-gray-900 text-white rounded-xl flex items-center justify-center active:scale-95"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 4v16m8-8H4"></path></svg></button>
                    </div>
                    <div class="mt-2">
                        <input type="number" x-model="newHoldCost" placeholder="成本价(可选，默认 100)" class="w-full bg-gray-50 border border-gray-100 rounded-xl px-3 py-2.5 text-sm">
                    </div>
                    <div class="mt-2 text-[10px] text-gray-400">支持输入代码自动补齐：美股 / 加股 / 数字货币。</div>
                </section>

                <!-- Core Input 3: Subscriptions -->
                <section class="app-surface rounded-3xl p-5">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 rounded-full bg-purple-50 text-purple-600 flex items-center justify-center"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg></div>
                            <h2 class="font-bold text-[15px]">订阅追踪股票</h2>
                        </div>
                        <span class="text-xs px-2 py-1 rounded-md font-medium app-count-pill" x-text="subscriptions.length + ' 只'"></span>
                    </div>

                    <!-- List -->
                    <div class="flex flex-wrap gap-2 mb-4">
                        <template x-for="(sub, idx) in subscriptions" :key="idx">
                            <div class="px-3 py-1.5 bg-gray-50 rounded-lg text-sm font-semibold flex items-center gap-2 border border-gray-100">
                                <span x-text="sub.symbol"></span>
                                <span class="text-[10px] font-medium text-gray-500" x-text="marketLabel(sub.market)"></span>
                                <button @click="removeSub(idx)" class="text-gray-400 active:text-red-500"><svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M6 18L18 6M6 6l12 12"></path></svg></button>
                            </div>
                        </template>
                        <div x-show="subscriptions.length === 0" class="text-xs text-gray-400 py-1">暂无订阅标的</div>
                    </div>

                    <!-- Add New Sub -->
                    <div class="flex gap-2">
                        <div class="flex-1 relative">
                            <input type="text" x-model="newSubSym" @input="updateSuggestions('sub')" @focus="updateSuggestions('sub')" @blur="clearSuggestionsLater('sub')" placeholder="输入代码(支持美股/加股/币)..." class="w-full bg-gray-50 border border-gray-100 rounded-xl px-4 py-2.5 text-sm uppercase">
                            <div x-show="subSuggestions.length > 0" x-cloak class="absolute z-40 mt-1 w-full max-h-56 overflow-y-auto rounded-xl border border-gray-200 bg-white shadow-lg">
                                <template x-for="asset in subSuggestions" :key="asset.symbol">
                                    <button type="button" @mousedown.prevent="pickSuggestion('sub', asset.symbol)" class="w-full px-3 py-2 text-left hover:bg-gray-50 active:bg-gray-100">
                                        <div class="flex items-center justify-between gap-2">
                                            <span class="text-xs font-semibold text-gray-800" x-text="asset.symbol"></span>
                                            <span class="text-[10px] text-gray-500" x-text="marketLabel(asset.market)"></span>
                                        </div>
                                        <div class="text-[10px] text-gray-400 truncate" x-text="asset.name"></div>
                                    </button>
                                </template>
                            </div>
                        </div>
                        <button @click="addSub()" class="shrink-0 px-4 bg-gray-900 text-white rounded-xl text-sm font-medium active:scale-95">添加</button>
                    </div>
                    <div class="mt-2 text-[10px] text-gray-400">输入时会显示补齐候选，点击即可填充代码。</div>
                </section>
                
            </main>

            <!-- Sticky Bottom Action (One-time Sync) -->
            <div class="absolute bottom-0 left-0 w-full backdrop-blur-xl border-t safe-pb app-sync-pad app-bottom-bar z-40">
                <button @click="syncData()" class="w-full bg-brand text-white py-4 rounded-2xl font-bold text-[16px] shadow-[0_8px_20px_rgba(15,23,42,0.15)] active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
                    <svg class="w-5 h-5 opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    开始订阅 (本地同步)
                </button>
            </div>
        </div>

        <!-- ==================== STEP 3: ACTIVE STATE (Cloud Monitored) ==================== -->
        <div x-show="step === 'active'" x-transition.opacity x-cloak class="flex-1 flex flex-col relative bg-brand z-50 h-full text-white">
            
            <header class="px-6 safe-pt pt-6 pb-2">
                <div class="flex justify-between items-center">
                    <div class="w-8 h-8 bg-white/10 rounded-lg flex items-center justify-center text-sm font-bold">A</div>
                    <button @click="step = 'construct'" class="text-white/60 text-sm font-medium px-3 py-1 bg-white/5 rounded-full active:bg-white/10">修改配置</button>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto no-scrollbar px-6 pt-8 pb-28 relative">
                <!-- Radar Animation -->
                <div class="relative w-48 h-48 flex items-center justify-center mb-10 mx-auto">
                    <div class="absolute w-full h-full bg-accent/20 rounded-full animate-ping" style="animation-duration: 3s"></div>
                    <div class="absolute w-3/4 h-3/4 bg-accent/30 rounded-full animate-pulse" style="animation-duration: 2s"></div>
                    <div class="relative w-20 h-20 bg-accent rounded-full flex items-center justify-center shadow-[0_0_40px_rgba(37,99,235,0.6)]">
                        <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                </div>

                <h2 class="text-2xl font-bold tracking-tight mb-3 text-center">后台已接入，监控运行中</h2>
                <p class="text-white/60 text-center text-[15px] leading-relaxed max-w-sm mx-auto">
                    您的现金 (<span class="text-white font-medium" x-text="'¥'+cash"></span>)、<span class="text-white font-medium" x-text="holdings.length+'只持仓'"></span> 及 <span class="text-white font-medium" x-text="subscriptions.length+'只订阅'"></span> 已同步云端。
                </p>

                <div class="bg-white/5 border border-white/10 rounded-2xl w-full mt-10 p-5 backdrop-blur-sm">
                    <div class="flex items-center gap-2 mb-3">
                        <div class="w-2 h-2 rounded-full animate-pulse" :class="backendConnected ? 'bg-emerald-400' : 'bg-amber-300'"></div>
                        <span class="text-sm font-semibold text-white/90">后台连接状态</span>
                        <span class="ml-auto text-[11px] text-white/60" x-text="backendLoading ? '同步中...' : (backendConnected ? '已连接' : '未连接')"></span>
                    </div>
                    <div class="space-y-2 text-xs text-white/60 font-mono">
                        <div class="flex justify-between"><span>账号</span> <span x-text="backendSnapshot.profile?.user?.email || (currentUser?.email || '未登录')"></span></div>
                        <div class="flex justify-between"><span>订阅计划</span> <span x-text="backendSnapshot.profile?.user?.plan || (currentUser?.plan || '--')"></span></div>
                        <div class="flex justify-between"><span>关注列表</span> <span x-text="(backendSnapshot.watchlist || []).length + ' 项'"></span></div>
                        <div class="flex justify-between"><span>持仓列表</span> <span x-text="(backendSnapshot.portfolio || []).length + ' 项'"></span></div>
                        <div class="flex justify-between"><span>通知中心</span> <span x-text="(backendSnapshot.notifications || []).length + ' 条'"></span></div>
                    </div>
                    <div class="mt-3 text-[11px] text-rose-200" x-show="backendError" x-text="backendError"></div>
                    <div class="mt-3 flex gap-2">
                        <button @click="loadBackendSnapshot()" class="px-3 py-1.5 text-xs font-medium rounded-lg bg-white/10 border border-white/15 text-white/90 active:bg-white/20">刷新后台数据</button>
                    </div>
                </div>

            </main>
        </div>

    </div>

    <script src="./js/offline-data.js"></script>
    <!-- App Logic -->
    <script>
        function appData() {
            const STORAGE_KEYS = {
                apiBase: 'stockpy.app.public-base',
                accessToken: 'stockpy.app.access-token',
                refreshToken: 'stockpy.app.refresh-token',
                user: 'stockpy.app.user'
            };

            return {
                step: 'login', // 'login', 'construct', 'active'
                email: '',
                code: '',
                toast: '',
                toastTimer: null,
                apiBaseUrl: '',
                accessToken: '',
                refreshToken: '',
                currentUser: null,
                backendConnected: false,
                backendLoading: false,
                backendError: '',
                backendCapabilities: [],
                backendTotals: { tags: 0, endpoints: 0 },
                backendSnapshot: {
                    profile: null,
                    dashboard: null,
                    portfolio: [],
                    watchlist: [],
                    notifications: []
                },
                lastBackendSyncAt: '',
                offlineUniverse: [],
                offlineSymbolMap: {},
                offlineAliasMap: {},
                offlineStats: { total: 0, US: 0, CAD: 0, CRYPTO: 0 },
                holdingSuggestions: [],
                subSuggestions: [],
                
                // Core minimal data
                cash: '1000000',
                holdings: [
                    { symbol: 'AAPL', name: 'Apple Inc.', market: 'US', shares: 100, avg_cost: 100 }
                ],
                subscriptions: [
                    { symbol: 'TSLA', name: 'Tesla, Inc.', market: 'US' },
                    { symbol: 'RY.TO', name: 'Royal Bank of Canada', market: 'CAD' },
                    { symbol: 'BTCUSDT', name: 'BTC / USDT', market: 'CRYPTO' }
                ],
                
                // Temp inputs
                newHoldSym: '',
                newHoldVol: '',
                newHoldCost: '',
                newSubSym: '',

                async initApp() {
                    this.initApiBaseUrl();
                    this.loadSessionFromStorage();
                    this.initOfflineData();
                    this.seedDefaultAssets();

                    if (this.accessToken) {
                        const connected = await this.loadBackendSnapshot();
                        if (connected || this.accessToken) {
                            this.step = 'construct';
                        }
                    }
                },

                normalizeBaseUrl(value) {
                    return String(value || '').trim().replace(/\/+$/, '');
                },

                initApiBaseUrl() {
                    const params = new URLSearchParams(window.location.search);
                    const queryBase = this.normalizeBaseUrl(params.get('public_api_base_url'));
                    if (queryBase) {
                        localStorage.setItem(STORAGE_KEYS.apiBase, queryBase);
                    }
                    const storedBase = this.normalizeBaseUrl(localStorage.getItem(STORAGE_KEYS.apiBase));
                    let defaultBase = window.location.origin;
                    if (defaultBase === 'null' || defaultBase.startsWith('file://')) {
                        defaultBase = 'http://127.0.0.1:3000';
                    }
                    this.apiBaseUrl = queryBase || storedBase || defaultBase;
                },

                apiUrl(path) {
                    return `${this.apiBaseUrl}${path}`;
                },

                loadSessionFromStorage() {
                    this.accessToken = localStorage.getItem(STORAGE_KEYS.accessToken) || '';
                    this.refreshToken = localStorage.getItem(STORAGE_KEYS.refreshToken) || '';
                    const rawUser = localStorage.getItem(STORAGE_KEYS.user);
                    this.currentUser = null;
                    if (rawUser) {
                        try {
                            this.currentUser = JSON.parse(rawUser);
                        } catch {
                            this.currentUser = null;
                        }
                    }
                },

                persistSession(sessionPayload) {
                    this.accessToken = sessionPayload?.access_token || '';
                    this.refreshToken = sessionPayload?.refresh_token || '';
                    this.currentUser = sessionPayload?.user || null;
                    if (this.accessToken) {
                        localStorage.setItem(STORAGE_KEYS.accessToken, this.accessToken);
                    }
                    if (this.refreshToken) {
                        localStorage.setItem(STORAGE_KEYS.refreshToken, this.refreshToken);
                    }
                    if (this.currentUser) {
                        localStorage.setItem(STORAGE_KEYS.user, JSON.stringify(this.currentUser));
                    }
                },

                clearSession() {
                    this.accessToken = '';
                    this.refreshToken = '';
                    this.currentUser = null;
                    this.backendConnected = false;
                    this.backendLoading = false;
                    this.backendError = '';
                    this.backendSnapshot = {
                        profile: null,
                        dashboard: null,
                        portfolio: [],
                        watchlist: [],
                        notifications: []
                    };
                    this.lastBackendSyncAt = '';
                    this.step = 'login';
                    localStorage.removeItem(STORAGE_KEYS.accessToken);
                    localStorage.removeItem(STORAGE_KEYS.refreshToken);
                    localStorage.removeItem(STORAGE_KEYS.user);
                },

                extractErrorMessage(payload, fallback) {
                    if (payload && typeof payload === 'object') {
                        let detail = payload.detail ?? payload.message ?? payload.code;
                        if (!detail && payload.error && typeof payload.error === 'object') {
                            detail = payload.error.message ?? payload.error.code;
                        }
                        if (!detail && payload.error && typeof payload.error === 'string') {
                            detail = payload.error;
                        }
                        if (detail && typeof detail === 'object') {
                            detail = JSON.stringify(detail);
                        }
                        if (detail) {
                            return String(detail);
                        }
                    }
                    return fallback;
                },

                async requestApi(method, path, options = {}) {
                    const { body, auth = true, retry = true } = options;
                    const headers = new Headers({ Accept: 'application/json' });
                    if (body !== undefined) {
                        headers.set('Content-Type', 'application/json');
                    }
                    if (auth && this.accessToken) {
                        headers.set('Authorization', `Bearer ${this.accessToken}`);
                    }

                    const response = await fetch(this.apiUrl(path), {
                        method,
                        headers,
                        body: body !== undefined ? JSON.stringify(body) : undefined,
                    });

                    const rawText = await response.text();
                    let payload = null;
                    try {
                        payload = rawText ? JSON.parse(rawText) : null;
                    } catch {
                        payload = null;
                    }

                    if (response.status === 401 && auth && retry && this.refreshToken) {
                        const refreshed = await this.refreshSession();
                        if (refreshed) {
                            return this.requestApi(method, path, { body, auth, retry: false });
                        }
                    }

                    if (!response.ok) {
                        const message = this.extractErrorMessage(payload, rawText || `HTTP ${response.status}`);
                        throw new Error(message);
                    }
                    return payload;
                },

                async refreshSession() {
                    if (!this.refreshToken) {
                        return false;
                    }
                    try {
                        const refreshed = await this.requestApi('POST', '/v1/auth/refresh', {
                            body: { refresh_token: this.refreshToken },
                            auth: false,
                            retry: false,
                        });
                        this.persistSession(refreshed);
                        return Boolean(this.accessToken);
                    } catch {
                        this.clearSession();
                        return false;
                    }
                },

                inferMarketFromSymbol(symbol) {
                    const normalized = this.normalizeSymbol(symbol);
                    const resolved = this.resolveAsset(normalized);
                    if (resolved?.market) return resolved.market;
                    if (normalized.endsWith('.TO')) return 'CAD';
                    if (normalized.endsWith('USDT') || normalized.endsWith('USDC')) return 'CRYPTO';
                    return 'US';
                },

                resolveAssetDisplay(symbol) {
                    const resolved = this.resolveAsset(symbol);
                    const normalized = this.normalizeSymbol(symbol);
                    if (resolved) {
                        return {
                            symbol: this.normalizeSymbol(resolved.symbol),
                            name: resolved.name || normalized,
                            market: resolved.market || this.inferMarketFromSymbol(normalized),
                        };
                    }
                    return {
                        symbol: normalized,
                        name: normalized,
                        market: this.inferMarketFromSymbol(normalized),
                    };
                },

                async loadBackendSnapshot() {
                    if (!this.accessToken) {
                        this.backendConnected = false;
                        return false;
                    }
                    this.backendLoading = true;
                    this.backendError = '';

                    try {
                        const [profile, dashboard, portfolio, watchlist, notificationPayload] = await Promise.all([
                            this.requestApi('GET', '/v1/account/profile'),
                            this.requestApi('GET', '/v1/account/dashboard'),
                            this.requestApi('GET', '/v1/portfolio'),
                            this.requestApi('GET', '/v1/watchlist'),
                            this.requestApi('GET', '/v1/notifications?limit=10'),
                        ]);

                        this.backendSnapshot = {
                            profile,
                            dashboard,
                            portfolio: Array.isArray(portfolio) ? portfolio : [],
                            watchlist: Array.isArray(watchlist) ? watchlist : [],
                            notifications: Array.isArray(notificationPayload?.items) ? notificationPayload.items : [],
                        };
                        this.backendConnected = true;
                        this.lastBackendSyncAt = new Date().toISOString();
                        this.applyBackendSnapshotToDraft();
                        return true;
                    } catch (error) {
                        this.backendConnected = false;
                        this.backendError = `后台请求失败: ${error.message}`;
                        return false;
                    } finally {
                        this.backendLoading = false;
                    }
                },

                applyBackendSnapshotToDraft() {
                    const dashboardAccount = this.backendSnapshot.dashboard?.account;
                    if (dashboardAccount && Number.isFinite(Number(dashboardAccount.total_capital))) {
                        this.cash = String(Math.round(Number(dashboardAccount.total_capital)));
                    }

                    const portfolioItems = Array.isArray(this.backendSnapshot.portfolio)
                        ? this.backendSnapshot.portfolio
                        : [];
                    this.holdings = portfolioItems.map((item) => {
                        const symbol = this.normalizeSymbol(item.symbol || '');
                        const display = this.resolveAssetDisplay(symbol);
                        return {
                            symbol: display.symbol,
                            name: display.name,
                            market: display.market,
                            shares: Number(item.shares || 0),
                            avg_cost: Number(item.avg_cost || 100),
                        };
                    });

                    const watchlistItems = Array.isArray(this.backendSnapshot.watchlist)
                        ? this.backendSnapshot.watchlist
                        : [];
                    this.subscriptions = watchlistItems.map((item) => {
                        const symbol = this.normalizeSymbol(item.symbol || '');
                        const display = this.resolveAssetDisplay(symbol);
                        return {
                            symbol: display.symbol,
                            name: display.name,
                            market: display.market,
                        };
                    });
                },

                formatNumber(value, currency = 'USD') {
                    const amount = Number(value);
                    if (!Number.isFinite(amount)) {
                        return '--';
                    }
                    try {
                        return new Intl.NumberFormat('en-US', {
                            style: 'currency',
                            currency: currency || 'USD',
                            maximumFractionDigits: 2,
                        }).format(amount);
                    } catch {
                        return `${amount.toFixed(2)} ${currency || ''}`.trim();
                    }
                },

                formatTime(value) {
                    if (!value) {
                        return '尚未同步';
                    }
                    const date = new Date(value);
                    if (Number.isNaN(date.getTime())) {
                        return String(value);
                    }
                    return date.toLocaleString();
                },

                initOfflineData() {
                    const payload = window.OFFLINE_MARKET_DATA || {};
                    const universe = Array.isArray(payload) ? payload : (payload.universe || []);
                    const stats = Array.isArray(payload) ? this.computeOfflineStats(universe) : (payload.stats || this.computeOfflineStats(universe));

                    this.offlineUniverse = universe;
                    this.offlineSymbolMap = {};
                    this.offlineAliasMap = {};

                    for (const asset of universe) {
                        const symbol = this.normalizeSymbol(asset.symbol || '');
                        if (!symbol) continue;
                        this.offlineSymbolMap[symbol] = asset;
                        const aliases = Array.isArray(asset.aliases) ? asset.aliases : [];
                        for (const rawAlias of aliases) {
                            const alias = this.normalizeSymbol(rawAlias || '');
                            if (alias && !this.offlineAliasMap[alias]) {
                                this.offlineAliasMap[alias] = symbol;
                            }
                        }
                    }

                    this.offlineStats = {
                        total: universe.length,
                        US: stats.US || 0,
                        CAD: stats.CAD || 0,
                        CRYPTO: stats.CRYPTO || 0
                    };
                },

                computeOfflineStats(universe) {
                    const stats = { US: 0, CAD: 0, CRYPTO: 0 };
                    for (const asset of universe) {
                        if (asset && stats[asset.market] !== undefined) {
                            stats[asset.market] += 1;
                        }
                    }
                    return stats;
                },

                seedDefaultAssets() {
                    const seededHoldings = [];
                    const seededSubscriptions = [];

                    const holdingDefaults = [
                        { symbol: 'AAPL', shares: 100, avg_cost: 100 },
                        { symbol: 'RY.TO', shares: 150, avg_cost: 100 },
                        { symbol: 'BTCUSDT', shares: 1, avg_cost: 30000 }
                    ];
                    for (const item of holdingDefaults) {
                        const asset = this.resolveAsset(item.symbol);
                        if (asset) {
                            seededHoldings.push({
                                symbol: this.normalizeSymbol(asset.symbol),
                                name: asset.name,
                                market: asset.market,
                                shares: item.shares,
                                avg_cost: item.avg_cost,
                            });
                        }
                    }

                    const subDefaults = ['TSLA', 'ENB.TO', 'ETHUSDT'];
                    for (const symbol of subDefaults) {
                        const asset = this.resolveAsset(symbol);
                        if (asset) {
                            seededSubscriptions.push({
                                symbol: this.normalizeSymbol(asset.symbol),
                                name: asset.name,
                                market: asset.market
                            });
                        }
                    }

                    if (seededHoldings.length > 0) {
                        this.holdings = seededHoldings;
                    }
                    if (seededSubscriptions.length > 0) {
                        this.subscriptions = seededSubscriptions;
                    }
                },

                normalizeSymbol(value) {
                    return String(value || '').trim().toUpperCase().replace(/\s+/g, '');
                },

                resolveAsset(rawSymbol) {
                    const normalized = this.normalizeSymbol(rawSymbol);
                    if (!normalized) return null;

                    // Exact symbol has highest priority.
                    if (this.offlineSymbolMap[normalized]) {
                        return this.offlineSymbolMap[normalized];
                    }

                    const canonical = this.offlineAliasMap[normalized];
                    if (canonical && this.offlineSymbolMap[canonical]) {
                        return this.offlineSymbolMap[canonical];
                    }
                    return null;
                },

                marketLabel(market) {
                    if (market === 'US') return '美股';
                    if (market === 'CAD') return '加股';
                    if (market === 'CRYPTO') return '数字货币';
                    return market || '未知';
                },

                searchAssets(query, limit = 10) {
                    const normalized = this.normalizeSymbol(query);
                    if (!normalized) return [];

                    const plainQuery = !normalized.includes('.TO');
                    const scored = [];

                    for (const asset of this.offlineUniverse) {
                        const symbol = this.normalizeSymbol(asset.symbol || '');
                        if (!symbol) continue;

                        const name = String(asset.name || '').toUpperCase();
                        const aliases = Array.isArray(asset.aliases) ? asset.aliases : [];
                        const normalizedAliases = aliases.map((alias) => this.normalizeSymbol(alias));

                        let rank = null;
                        if (symbol === normalized) {
                            rank = 0;
                        } else if (normalizedAliases.some((alias) => alias === normalized)) {
                            rank = 1;
                        } else if (symbol.startsWith(normalized)) {
                            rank = 2;
                        } else if (normalizedAliases.some((alias) => alias.startsWith(normalized))) {
                            rank = 3;
                        } else if (name.includes(normalized)) {
                            rank = 4;
                        } else if (symbol.includes(normalized) || normalizedAliases.some((alias) => alias.includes(normalized))) {
                            rank = 5;
                        }

                        if (rank === null) continue;

                        // For plain query, prefer US primary symbol when .TO and US overlap.
                        if (
                            plainQuery &&
                            symbol.endsWith('.TO') &&
                            this.offlineSymbolMap[symbol.slice(0, -3)]
                        ) {
                            rank += 1;
                        }
                        if (plainQuery && asset.market === 'US') {
                            rank -= 0.25;
                        }

                        scored.push({
                            asset,
                            rank,
                            symbolLength: symbol.length,
                        });
                    }

                    scored.sort((a, b) => {
                        if (a.rank !== b.rank) return a.rank - b.rank;
                        if (a.symbolLength !== b.symbolLength) return a.symbolLength - b.symbolLength;
                        return a.asset.symbol.localeCompare(b.asset.symbol);
                    });

                    return scored.slice(0, limit).map((item) => item.asset);
                },

                updateSuggestions(field) {
                    if (field === 'holding') {
                        this.holdingSuggestions = this.searchAssets(this.newHoldSym, 8);
                        return;
                    }
                    this.subSuggestions = this.searchAssets(this.newSubSym, 10);
                },

                clearSuggestionsLater(field) {
                    setTimeout(() => {
                        if (field === 'holding') {
                            this.holdingSuggestions = [];
                        } else {
                            this.subSuggestions = [];
                        }
                    }, 120);
                },

                pickSuggestion(field, symbol) {
                    const selectByQuery = (query, selectedSymbol) => {
                        const normalizedQuery = this.normalizeSymbol(query);
                        const normalizedSelected = this.normalizeSymbol(selectedSymbol);
                        if (
                            normalizedSelected.endsWith('.TO') &&
                            !normalizedQuery.includes('.TO')
                        ) {
                            const usCandidate = normalizedSelected.slice(0, -3);
                            if (this.offlineSymbolMap[usCandidate]) {
                                return usCandidate;
                            }
                        }
                        return normalizedSelected;
                    };

                    if (field === 'holding') {
                        this.newHoldSym = selectByQuery(this.newHoldSym, symbol);
                        this.holdingSuggestions = [];
                        return;
                    }
                    this.newSubSym = selectByQuery(this.newSubSym, symbol);
                    this.subSuggestions = [];
                },

                async sendCode() {
                    const email = String(this.email || '').trim().toLowerCase();
                    if (!email) {
                        this.showToast('请输入邮箱地址');
                        return;
                    }
                    try {
                        const result = await this.requestApi('POST', '/v1/auth/send-code', {
                            body: { email },
                            auth: false,
                            retry: false,
                        });
                        if (result?.dev_code) {
                            this.code = result.dev_code;
                            this.showToast(`验证码已生成，开发码 ${result.dev_code}`);
                            return;
                        }
                        this.showToast(result?.message || '验证码已发送，请查收');
                    } catch (error) {
                        this.showToast(`发送失败：${error.message}`);
                    }
                },

                async login() {
                    const email = String(this.email || '').trim().toLowerCase();
                    const code = String(this.code || '').trim();
                    if (!email || code.length !== 6) {
                        this.showToast('请输入邮箱和6位验证码');
                        return;
                    }

                    const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC';
                    const locale = navigator.language || 'zh-CN';

                    try {
                        const sessionPayload = await this.requestApi('POST', '/v1/auth/verify', {
                            body: { email, code, locale, timezone },
                            auth: false,
                            retry: false,
                        });
                        this.persistSession(sessionPayload);
                        const connected = await this.loadBackendSnapshot();
                        if (!this.accessToken) {
                            this.showToast('登录会话已失效，请重新登录');
                            return;
                        }
                        this.step = 'construct';
                        this.showToast(connected ? '登录成功，已连接后台' : '登录成功，后台暂不可用，可稍后刷新');
                    } catch (error) {
                        this.showToast(`登录失败：${error.message}`);
                    }
                },

                addHolding() {
                    const normalizedInput = this.normalizeSymbol(this.newHoldSym);
                    const shares = parseInt(this.newHoldVol, 10);
                    if (!normalizedInput) {
                        this.showToast('请输入股票代码。');
                        return;
                    }
                    if (!Number.isFinite(shares) || shares <= 0) {
                        this.showToast('请输入有效股数。');
                        return;
                    }

                    const avgCostInput = Number.parseFloat(this.newHoldCost);
                    const avgCost = Number.isFinite(avgCostInput) && avgCostInput > 0 ? avgCostInput : 100;
                    const display = this.resolveAssetDisplay(normalizedInput);

                    const symbol = this.normalizeSymbol(display.symbol);
                    const existing = this.holdings.find((item) => item.symbol === symbol);
                    if (existing) {
                        existing.shares += shares;
                        existing.avg_cost = avgCost;
                    } else {
                        this.holdings.push({
                            symbol,
                            name: display.name,
                            market: display.market,
                            shares,
                            avg_cost: avgCost,
                        });
                    }

                    this.newHoldSym = '';
                    this.newHoldVol = '';
                    this.newHoldCost = '';
                    this.holdingSuggestions = [];
                    this.showToast('已写入本地离线持仓。');
                },
                removeHolding(idx) {
                    this.holdings.splice(idx, 1);
                },

                addSub() {
                    const normalizedInput = this.normalizeSymbol(this.newSubSym);
                    if (!normalizedInput) {
                        this.showToast('请输入订阅代码。');
                        return;
                    }

                    const display = this.resolveAssetDisplay(normalizedInput);

                    const symbol = this.normalizeSymbol(display.symbol);
                    const exists = this.subscriptions.some((item) => item.symbol === symbol);
                    if (exists) {
                        this.showToast('该标的已在订阅列表中。');
                        return;
                    }

                    this.subscriptions.push({
                        symbol,
                        name: display.name,
                        market: display.market
                    });
                    this.newSubSym = '';
                    this.subSuggestions = [];
                    this.showToast('已写入本地离线订阅。');
                },
                removeSub(idx) {
                    this.subscriptions.splice(idx, 1);
                },

                planLimits(plan) {
                    const normalized = String(plan || '').toLowerCase();
                    const watchlistLimits = { free: 5, pro: 10, max: 20, premium: 20 };
                    const portfolioLimits = { free: 3, pro: 6, max: 12, premium: 12 };
                    return {
                        watchlist: watchlistLimits[normalized] ?? 10,
                        portfolio: portfolioLimits[normalized] ?? 3,
                    };
                },

                buildStartSubscriptionPayload() {
                    const totalCapital = Number(this.cash);
                    if (!Number.isFinite(totalCapital) || totalCapital <= 0) {
                        throw new Error('请输入有效现金金额。');
                    }

                    const limits = this.planLimits(this.currentUser?.plan);
                    const watchlist = this.subscriptions
                        .map((item) => this.normalizeSymbol(item.symbol))
                        .filter((symbol) => Boolean(symbol))
                        .map((symbol) => ({
                            symbol,
                            min_score: 65,
                            notify: true,
                        }));
                    if (watchlist.length === 0) {
                        throw new Error('请至少添加1个订阅标的。');
                    }
                    if (watchlist.length > limits.watchlist) {
                        throw new Error(`当前套餐最多支持 ${limits.watchlist} 个订阅标的。`);
                    }

                    const portfolio = this.holdings
                        .map((item) => ({
                            symbol: this.normalizeSymbol(item.symbol),
                            shares: Number.parseInt(item.shares, 10),
                            avg_cost: Number.parseFloat(item.avg_cost),
                        }))
                        .filter((item) => item.symbol && Number.isFinite(item.shares) && item.shares > 0)
                        .map((item) => ({
                            symbol: item.symbol,
                            shares: item.shares,
                            avg_cost: Number.isFinite(item.avg_cost) && item.avg_cost > 0 ? item.avg_cost : 100,
                            target_profit: 0.15,
                            stop_loss: 0.08,
                            notify: true,
                        }));
                    if (portfolio.length > limits.portfolio) {
                        throw new Error(`当前套餐最多支持 ${limits.portfolio} 个持仓。`);
                    }

                    return {
                        allow_empty_portfolio: portfolio.length === 0,
                        account: {
                            total_capital: totalCapital,
                            currency: 'USD',
                        },
                        watchlist,
                        portfolio,
                    };
                },

                async syncData() {
                    if (!this.accessToken) {
                        this.showToast('请先完成登录并连接后台。');
                        return;
                    }

                    let payload;
                    try {
                        payload = this.buildStartSubscriptionPayload();
                    } catch (error) {
                        this.showToast(error.message || '数据校验失败');
                        return;
                    }

                    this.backendLoading = true;
                    try {
                        const result = await this.requestApi('POST', '/v1/account/start-subscription', {
                            body: payload,
                            auth: true,
                        });
                        this.step = 'active';
                        await this.loadBackendSnapshot();
                        this.showToast(result?.message || '配置已同步至后台，监控已开启');
                    } catch (error) {
                        this.showToast(`同步失败：${error.message}`);
                    } finally {
                        this.backendLoading = false;
                    }
                },

                showToast(msg) {
                    this.toast = String(msg || '');
                    if (this.toastTimer) {
                        clearTimeout(this.toastTimer);
                    }
                    this.toastTimer = setTimeout(() => {
                        this.toast = '';
                        this.toastTimer = null;
                    }, 2600);
                }
            }
        }
    </script>
