<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Alpha Smart Subscribe">
    <title>Alpha 极简智投</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600&family=Noto+Sans+SC:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="apple-touch-icon" href="./assets/pwa-icon.svg">
    <!-- Production Tailwind CSS bundle -->
    <link rel="stylesheet" href="./tailwind.generated.css">
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        :root {
            --app-bg-a: #f3f8ff;
            --app-bg-b: #f8fbfd;
            --app-bg-c: #fff8f3;
            --app-surface-border: #e8eef8;
            --app-surface-shadow: 0 8px 22px rgba(15, 23, 42, 0.04);
            --app-font-body: "Noto Sans SC", "Plus Jakarta Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            --app-font-display: "Plus Jakarta Sans", "Noto Sans SC", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            --app-font-mono: "JetBrains Mono", "SF Mono", "Menlo", monospace;
        }
        body { 
            -webkit-tap-highlight-color: transparent; 
            background: linear-gradient(165deg, var(--app-bg-a) 0%, var(--app-bg-b) 52%, var(--app-bg-c) 100%);
            color: #111827;
            font-family: var(--app-font-body);
            letter-spacing: 0.005em;
            line-height: 1.55;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        h1, h2, h3, .font-bold, .font-extrabold {
            font-family: var(--app-font-display);
            letter-spacing: -0.012em;
            line-height: 1.2;
        }
        p, label, button, input, textarea, span {
            font-feature-settings: "kern" 1, "liga" 1;
        }
        .font-mono {
            font-family: var(--app-font-mono);
            letter-spacing: 0.012em;
        }
        .text-xs, .text-sm, .text-\[11px\], .text-\[10px\] {
            line-height: 1.58;
        }
        .text-lg, .text-xl, .text-2xl, .text-3xl {
            line-height: 1.24;
        }
        input::placeholder, textarea::placeholder {
            color: #9aa3b2;
        }
        .safe-pb { padding-bottom: env(safe-area-inset-bottom, 16px); }
        .safe-pt { /* padding-top: env(safe-area-inset-top, 44px); */ }
        .pt-4 { padding-bottom: 1rem; }
        .pt-6 { padding-top: 8px; }
        .app-shell {
            background: linear-gradient(180deg, #ffffff 0%, #fbfdff 58%, #fffdfa 100%);
        }
        .app-login-soft {
            background: linear-gradient(180deg, #ffffff 0%, #f6faff 100%);
        }
        .app-construct {
            background: linear-gradient(180deg, #f8fbff 0%, #f8fbfc 45%, #fffaf5 100%);
        }
        .app-header-soft {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.98) 0%, rgba(246, 250, 255, 0.92) 100%);
            border-bottom: 1px solid #e8eef7;
        }
        .app-surface {
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid var(--app-surface-border);
            box-shadow: var(--app-surface-shadow);
        }
        .app-count-pill {
            background: #eef3ff;
            color: #5f6888;
        }
        .app-top-offset {
            top: 14px;
        }
        .app-sync-pad {
            padding: 0.5rem 1rem;
        }
        .app-bottom-bar {
            background: rgba(248, 251, 255, 0.86);
            border-top-color: #e7edf8;
        }
        .rounded-lg {
            border-radius: .5rem;
            float: left;
            margin-right: 8px;
        }
        .flex-wrap {
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .px-3 {
            padding-left: .75rem;
            padding-right: .75rem;
        }
        .bg-white\/5 {
            background-color: hsla(0, 0%, 100%, .05);
            margin-bottom: 1rem;
            padding: 8px;
        }
        .notify-chip {
            border-radius: .75rem;
            padding: .375rem .75rem;
        }
        .notify-meta {
            border-radius: .75rem;
            padding: .5rem;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        [x-cloak] { display: none !important; }
        
        /* Smooth transitions */
        .fade-enter-active, .fade-leave-active { transition: opacity 0.3s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
        
        /* iOS style inputs */
        input { appearance: none; outline: none; }
        input:focus { ring: 0; outline: none; }
    </style>
</head>
<body class="text-gray-900 overflow-hidden" x-data="appData()" x-init="initApp()">
    
    <!-- Mobile App Container -->
    <div class="w-full max-w-md mx-auto app-shell h-screen flex flex-col relative shadow-sm overflow-hidden">
        
        <!-- Toast Notification -->
        <div x-show="toast" x-transition x-cloak class="absolute top-12 left-0 right-0 z-50 flex justify-center safe-pt pointer-events-none">
            <div class="bg-gray-900 text-white px-4 py-2 rounded-full text-sm font-medium shadow-lg" x-text="toast"></div>
        </div>

        <!-- ==================== STEP 1: LOGIN ==================== -->
        <div x-show="step === 'login'" x-transition.opacity class="flex-1 flex flex-col overflow-y-auto no-scrollbar px-6 safe-pt app-login-soft z-10 relative">
            <div class="mt-12 mb-8">
                <img
                    src="./assets/pwa-icon.svg"
                    alt="订阅端 App 图标"
                    class="w-12 h-12 rounded-2xl object-cover mb-6 shadow-sm border border-brand/15"
                >
                <h1 class="text-3xl font-extrabold tracking-tight">欢迎回来</h1>
                <p class="text-gray-500 mt-2 text-sm">请输入您的邮箱以登录或注册您的订阅账户</p>
                <div x-show="showInstallCard()" x-cloak class="mt-6 rounded-2xl border border-brand/15 bg-white/85 px-4 py-3 shadow-sm">
                    <div class="flex items-center justify-between gap-3">
                        <div class="min-w-0">
                            <p class="text-xs font-semibold text-slate-700">安装到手机桌面</p>
                            <p class="mt-1 text-[11px] text-slate-500 leading-relaxed" x-text="installStatus"></p>
                        </div>
                        <button
                            @click="triggerInstallApp()"
                            :disabled="installBusy"
                            :class="installBusy ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'bg-brand/10 text-brand hover:bg-brand/15 active:bg-brand/20'"
                            class="shrink-0 px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors"
                            x-text="installButtonLabel()"
                        ></button>
                    </div>
                </div>
            </div>

            <div class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">邮箱地址</label>
                    <input type="email" x-model="email" placeholder="name@example.com" 
                           class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3.5 text-[15px] focus:bg-white focus:border-brand transition-colors">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">验证码</label>
                    <div class="flex gap-3">
                        <input type="number" x-model="code" placeholder="6位数字" 
                               class="flex-1 bg-gray-50 border border-gray-200 rounded-xl px-4 py-3.5 text-[15px] focus:bg-white focus:border-brand transition-colors">
                        <button
                            @click="sendCode()"
                            :disabled="sendCodeBusy || sendCodeCooldownSeconds > 0"
                            :class="(sendCodeBusy || sendCodeCooldownSeconds > 0) ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'bg-gray-100 text-gray-700 active:bg-gray-200'"
                            class="shrink-0 px-4 font-medium rounded-xl text-sm transition-colors"
                            x-text="sendCodeButtonLabel()"
                        ></button>
                    </div>
                </div>
            </div>

            <div class="mt-8 safe-pb pb-6 pt-4">
                <button @click="login()" 
                        :class="email && code ? 'bg-brand text-white shadow-md' : 'bg-gray-100 text-gray-400 cursor-not-allowed'"
                        class="w-full py-4 rounded-2xl font-bold text-[15px] transition-all active:scale-[0.98]">
                    安全登录并连接后台
                </button>
            </div>
        </div>

        <!-- ==================== STEP 2: CONSTRUCT (Offline First) ==================== -->
        <div x-show="step === 'construct'" x-transition.opacity x-cloak class="flex-1 flex flex-col relative app-construct z-20 h-full">
            
            <header class="px-5 safe-pt pb-4 sticky app-top-offset app-header-soft z-30">
                <h1 class="text-xl font-extrabold tracking-tight">订阅配置</h1>
                <p class="mt-1 text-xs text-gray-500" x-text="backendConnected ? '后台已连接，当前录入将同步到服务器。' : '当前离线草稿模式，登录后可一键同步到后台。'"></p>
            </header>

            <main class="flex-1 overflow-y-auto no-scrollbar px-5 py-6 pb-32 space-y-8">
                
                <!-- Core Input 1: Cash -->
                <section class="app-surface rounded-3xl p-5">
                    <div class="flex items-center gap-2 mb-4">
                        <div class="w-8 h-8 rounded-full bg-blue-50 text-accent flex items-center justify-center"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></div>
                        <h2 class="font-bold text-[15px]">当前可用现金</h2>
                    </div>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-medium">¥</span>
                        <input type="number" x-model="cash" class="w-full bg-gray-50 border border-gray-100 rounded-2xl pl-8 pr-4 py-4 text-xl font-bold focus:bg-white focus:border-gray-200 transition-colors" placeholder="0.00">
                    </div>
                </section>

                <!-- Core Input 2: Holdings -->
                <section class="app-surface rounded-3xl p-5">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 rounded-full bg-emerald-50 text-emerald-600 flex items-center justify-center"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path></svg></div>
                            <h2 class="font-bold text-[15px]">已持仓股票</h2>
                        </div>
                        <span class="text-xs px-2 py-1 rounded-md font-medium app-count-pill" x-text="holdings.length + ' 只'"></span>
                    </div>

                    <!-- List -->
                    <div class="space-y-2 mb-4">
                        <template x-for="(item, idx) in holdings" :key="idx">
                            <div class="px-4 py-3 bg-gray-50 rounded-xl">
                                <div class="flex items-start justify-between gap-3">
                                    <div class="min-w-0 flex-1">
                                        <div class="font-semibold text-[15px]" x-text="item.symbol"></div>
                                        <div class="text-[11px] text-gray-400" x-text="item.name"></div>
                                        <div class="mt-1 text-sm text-gray-500"><span x-text="item.shares"></span> 股 / $<span x-text="Number(item.avg_cost || 0).toFixed(2)"></span></div>
                                    </div>
                                    <div class="flex items-center gap-3 shrink-0">
                                        <div class="text-[10px] px-2 py-0.5 rounded bg-white border border-gray-200 text-gray-500" x-text="marketLabel(item.market)"></div>
                                        <button @click="removeHolding(idx)" class="text-gray-300 hover:text-red-500"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M6 18L18 6M6 6l12 12"></path></svg></button>
                                    </div>
                                </div>

                                <div x-show="item.exit_state && item.exit_state.hasPlan" x-cloak class="mt-3 rounded-xl border border-emerald-100 bg-white px-3 py-2">
                                    <div class="text-[11px] font-semibold text-emerald-700">分批退出计划</div>
                                    <div class="mt-2 flex flex-wrap gap-1.5">
                                        <template x-for="stage in (item.exit_state?.stageChips || [])" :key="stage.id">
                                            <div class="px-2 py-1 rounded-lg bg-emerald-50 border border-emerald-100 text-[10px] font-medium text-emerald-700">
                                                <span x-text="stage.label"></span>
                                                <span class="text-emerald-500"> · </span>
                                                <span x-text="stage.detail"></span>
                                            </div>
                                        </template>
                                    </div>
                                    <div class="mt-2 text-[11px] text-gray-500" x-text="item.exit_state?.progressLabel"></div>
                                    <div class="mt-1 text-[11px] text-emerald-700" x-text="item.exit_state?.nextLabel"></div>
                                </div>
                            </div>
                        </template>
                        <div x-show="holdings.length === 0" class="text-center py-4 text-xs text-gray-400">暂无持仓</div>
                    </div>

                    <!-- Add New Holding -->
                    <div class="flex gap-2">
                        <div class="w-1/2 relative">
                            <input type="text" x-model="newHoldSym" @input="updateSuggestions('holding')" @focus="updateSuggestions('holding')" @blur="clearSuggestionsLater('holding')" placeholder="代码(如 AAPL / RY.TO / BTCUSDT)" class="w-full bg-gray-50 border border-gray-100 rounded-xl px-3 py-2.5 text-sm uppercase">
                            <div x-show="holdingSuggestions.length > 0" x-cloak class="absolute z-40 mt-1 w-full max-h-48 overflow-y-auto rounded-xl border border-gray-200 bg-white shadow-lg">
                                <template x-for="asset in holdingSuggestions" :key="asset.symbol">
                                    <button type="button" @mousedown.prevent="pickSuggestion('holding', asset.symbol)" class="w-full px-3 py-2 text-left hover:bg-gray-50 active:bg-gray-100">
                                        <div class="flex items-center justify-between gap-2">
                                            <span class="text-xs font-semibold text-gray-800" x-text="asset.symbol"></span>
                                            <span class="text-[10px] text-gray-500" x-text="marketLabel(asset.market)"></span>
                                        </div>
                                        <div class="text-[10px] text-gray-400 truncate" x-text="asset.name"></div>
                                    </button>
                                </template>
                            </div>
                        </div>
                        <input type="number" x-model="newHoldVol" placeholder="股数" class="w-1/2 bg-gray-50 border border-gray-100 rounded-xl px-3 py-2.5 text-sm">
                        <button @click="addHolding()" class="shrink-0 w-10 h-10 bg-gray-900 text-white rounded-xl flex items-center justify-center active:scale-95"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 4v16m8-8H4"></path></svg></button>
                    </div>
                    <div class="mt-2">
                        <input type="number" x-model="newHoldCost" placeholder="成本价(可选，默认 100)" class="w-full bg-gray-50 border border-gray-100 rounded-xl px-3 py-2.5 text-sm">
                    </div>
                    <div class="mt-2 text-[10px] text-gray-400">支持输入代码自动补齐：美股 / 加股 / 数字货币。</div>
                </section>

                <!-- Core Input 3: Subscriptions -->
                <section class="app-surface rounded-3xl p-5">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 rounded-full bg-purple-50 text-purple-600 flex items-center justify-center"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg></div>
                            <h2 class="font-bold text-[15px]">订阅追踪股票</h2>
                        </div>
                        <span class="text-xs px-2 py-1 rounded-md font-medium app-count-pill" x-text="subscriptions.length + ' 只'"></span>
                    </div>

                    <!-- List -->
                    <div class="flex flex-wrap gap-2 mb-4">
                        <template x-for="(sub, idx) in subscriptions" :key="idx">
                            <div class="px-3 py-1.5 bg-gray-50 rounded-lg text-sm font-semibold flex items-center gap-2 border border-gray-100">
                                <span x-text="sub.symbol"></span>
                                <span class="text-[10px] font-medium text-gray-500" x-text="marketLabel(sub.market)"></span>
                                <button @click="removeSub(idx)" class="text-gray-400 active:text-red-500"><svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M6 18L18 6M6 6l12 12"></path></svg></button>
                            </div>
                        </template>
                        <div x-show="subscriptions.length === 0" class="text-xs text-gray-400 py-1">暂无订阅标的</div>
                    </div>

                    <!-- Add New Sub -->
                    <div class="flex gap-2">
                        <div class="flex-1 relative">
                            <input type="text" x-model="newSubSym" @input="updateSuggestions('sub')" @focus="updateSuggestions('sub')" @blur="clearSuggestionsLater('sub')" placeholder="输入代码(支持美股/加股/币)..." class="w-full bg-gray-50 border border-gray-100 rounded-xl px-4 py-2.5 text-sm uppercase">
                            <div x-show="subSuggestions.length > 0" x-cloak class="absolute z-40 mt-1 w-full max-h-56 overflow-y-auto rounded-xl border border-gray-200 bg-white shadow-lg">
                                <template x-for="asset in subSuggestions" :key="asset.symbol">
                                    <button type="button" @mousedown.prevent="pickSuggestion('sub', asset.symbol)" class="w-full px-3 py-2 text-left hover:bg-gray-50 active:bg-gray-100">
                                        <div class="flex items-center justify-between gap-2">
                                            <span class="text-xs font-semibold text-gray-800" x-text="asset.symbol"></span>
                                            <span class="text-[10px] text-gray-500" x-text="marketLabel(asset.market)"></span>
                                        </div>
                                        <div class="text-[10px] text-gray-400 truncate" x-text="asset.name"></div>
                                    </button>
                                </template>
                            </div>
                        </div>
                        <button @click="addSub()" class="shrink-0 px-4 bg-gray-900 text-white rounded-xl text-sm font-medium active:scale-95">添加</button>
                    </div>
                    <div class="mt-2 text-[10px] text-gray-400">输入时会显示补齐候选，点击即可填充代码。</div>
                </section>
                
            </main>

            <!-- Sticky Bottom Action (One-time Sync) -->
            <div class="absolute bottom-0 left-0 w-full backdrop-blur-xl border-t safe-pb app-sync-pad app-bottom-bar z-40">
                <button @click="syncData()" class="w-full bg-brand text-white py-4 rounded-2xl font-bold text-[16px] shadow-[0_8px_20px_rgba(15,23,42,0.15)] active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
                    <svg class="w-5 h-5 opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    开始订阅 (本地同步)
                </button>
            </div>
        </div>

        <!-- ==================== STEP 3: ACTIVE STATE (Cloud Monitored) ==================== -->
        <div x-show="step === 'active'" x-transition.opacity x-cloak class="flex-1 flex flex-col relative bg-brand z-50 h-full text-white">
            
            <header class="px-6 safe-pt pt-6 pb-2">
                <div x-show="activePanel === 'overview'" x-cloak class="flex justify-between items-center">
                    <img
                        src="./assets/pwa-icon.svg"
                        alt="订阅端 App 图标"
                        class="w-8 h-8 rounded-xl object-cover border-white/20"
                    >
                    <button @click="step = 'construct'" class="text-white/60 text-sm font-medium px-3 py-1  rounded-full active:bg-white/10">修改配置</button>
                </div>
                <div x-show="activePanel === 'notifications'" x-cloak class="flex justify-between items-center gap-3">
                    <button @click="switchActivePanel('overview')" class="text-white/80 text-sm font-medium px-3 py-1 bg-white/10 rounded-full border border-white/15 active:bg-white/20">返回总览</button>
                    <div class="text-right">
                        <h2 class="text-base font-bold tracking-tight">通知中心</h2>
                    </div>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto no-scrollbar px-6 pt-6 pb-28 relative">
                <section x-show="activePanel === 'overview'" x-cloak>
                    <!-- Radar Animation -->
                    <div class="relative w-48 h-48 flex items-center justify-center mb-10 mx-auto">
                        <div class="absolute w-full h-full bg-accent/20 rounded-full animate-ping" style="animation-duration: 3s"></div>
                        <div class="absolute w-3/4 h-3/4 bg-accent/30 rounded-full animate-pulse" style="animation-duration: 2s"></div>
                        <div class="relative w-20 h-20 bg-accent rounded-full flex items-center justify-center shadow-[0_0_40px_rgba(37,99,235,0.6)]">
                            <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </div>
                    </div>

                    <h2 class="text-2xl font-bold tracking-tight mb-3 text-center">后台已接入，监控运行中</h2>
                    <p class="text-white/60 text-center text-[15px] leading-relaxed max-w-sm mx-auto">
                        您的现金 (<span class="text-white font-medium" x-text="'¥'+cash"></span>)、<span class="text-white font-medium" x-text="holdings.length+'只持仓'"></span> 及 <span class="text-white font-medium" x-text="subscriptions.length+'只订阅'"></span> 已同步云端。
                    </p>

                    <div class="bg-white/5 border border-white/10 rounded-2xl w-full mt-10 p-5 backdrop-blur-sm">

                                                    x-cloak
                                                    class="text-xs font-medium notify-chip border border-emerald-300/40 text-emerald-100 bg-emerald-400/10 active:bg-emerald-400/20"

    </div>

    <script src="./js/offline-data.js"></script>
    <!-- App Logic -->
    <script>
        function appData() {
            const STORAGE_KEYS = {
                apiBase: 'stockpy.app.public-base',
                accessToken: 'stockpy.app.access-token',
                refreshToken: 'stockpy.app.refresh-token',
                user: 'stockpy.app.user',
                pushDeviceId: 'stockpy.app.push-device-id'
            };
            const LOCAL_NOTIFICATION_DB = 'stockpy.local.notifications';
            const LOCAL_NOTIFICATION_STORE = 'notifications';
            const LOCAL_NOTIFICATION_MAX = 500;

            return {
                step: 'login', // 'login', 'construct', 'active'
                activePanel: 'overview', // 'overview', 'notifications'
                routeIntent: { openNotifications: false, notificationId: '' },
                selectedNotificationId: '',
                notificationScope: 'all',
                email: '',
                code: '',
                sendCodeBusy: false,
                sendCodeCooldownSeconds: 0,
                sendCodeCooldownTimer: null,
                toast: '',
                toastTimer: null,
                apiBaseUrl: '',
                accessToken: '',
                refreshToken: '',
                currentUser: null,
                pushSupported: false,
                pushConfigured: false,
                pushPermission: 'default',
                pushEnabled: false,
                pushBusy: false,
                pushStatus: '',
                pushPublicKey: '',
                pushDeviceId: '',
                pushServerId: '',
                serviceWorkerMessageHandler: null,
                installSupported: false,
                installReady: false,
                installBusy: false,
                installInstalled: false,
                installManualMode: false,
                installStatus: '正在检测安装能力...',
                installDeferredPrompt: null,
                installListenersBound: false,
                notificationDeletePressTimer: null,
                notificationDeletePressId: '',
                notificationDeletePressTriggered: false,
                backendConnected: false,
                backendLoading: false,
                backendError: '',
                backendCapabilities: [],
                backendTotals: { tags: 0, endpoints: 0 },
                backendSnapshot: {
                    profile: null,
                    dashboard: null,
                    portfolio: [],
                    watchlist: [],
                    notifications: []
                },
                lastBackendSyncAt: '',
                offlineUniverse: [],
                offlineSymbolMap: {},
                offlineAliasMap: {},
                offlineStats: { total: 0, US: 0, CAD: 0, CRYPTO: 0 },
                holdingSuggestions: [],
                subSuggestions: [],
                
                // Core minimal data
                cash: '1000000',
                holdings: [
                    {
                        symbol: 'AAPL',
                        name: 'Apple Inc.',
                        market: 'US',
                        shares: 100,
                        avg_cost: 100,
                        exit_state: {
                            hasPlan: false,
                            stageChips: [],
                            progressLabel: '',
                            nextLabel: '',
                        },
                    }
                ],
                subscriptions: [
                    { symbol: 'TSLA', name: 'Tesla, Inc.', market: 'US' },
                    { symbol: 'RY.TO', name: 'Royal Bank of Canada', market: 'CAD' },
                    { symbol: 'BTCUSDT', name: 'BTC / USDT', market: 'CRYPTO' }
                ],
                
                // Temp inputs
                newHoldSym: '',
                newHoldVol: '',
                newHoldCost: '',
                newSubSym: '',

                async initApp() {
                    this.routeIntent = this.parseRouteIntent();
                    this.initApiBaseUrl();
                    this.loadSessionFromStorage();
                    this.initOfflineData();
                    this.seedDefaultAssets();
                    this.bindServiceWorkerNotificationEvents();
                    void this.setupInstallSupport();
                    await this.loadLocalNotifications(true);

                    if (this.accessToken) {
                        if (this.tokenExpiresSoon(this.accessToken) && this.refreshToken) {
                            await this.refreshSession();
                        }
                        const connected = await this.loadBackendSnapshot();
                        if (connected || this.accessToken) {
                            const isSubActive = this.backendSnapshot?.dashboard?.subscription?.status === 'active';
                            this.step = isSubActive ? 'active' : 'construct';
                            if (isSubActive) {
                                this.applyRouteIntent();
                            }
                        }
                    }
                    await this.refreshPushState();
                },

                normalizeBaseUrl(value) {
                    return String(value || '').trim().replace(/\/+$/, '');
                },

                initApiBaseUrl() {
                    const params = new URLSearchParams(window.location.search);
                    const queryBase = this.normalizeBaseUrl(params.get('public_api_base_url'));
                    if (queryBase) {
                        localStorage.setItem(STORAGE_KEYS.apiBase, queryBase);
                    }
                    const storedBase = this.normalizeBaseUrl(localStorage.getItem(STORAGE_KEYS.apiBase));
                    let defaultBase = window.location.origin;
                    if (defaultBase === 'null' || defaultBase.startsWith('file://')) {
                        defaultBase = 'http://127.0.0.1:3000';
                    }
                    this.apiBaseUrl = queryBase || storedBase || defaultBase;
                },

                apiUrl(path) {
                    return `${this.apiBaseUrl}${path}`;
                },

                parseRouteIntent() {
                    const pathname = (window.location.pathname || '/app/').replace(/\/+$/, '') || '/app';
                    const query = new URLSearchParams(window.location.search || '');
                    const queryNotificationId = String(
                        query.get('notification_id') || query.get('id') || ''
                    ).trim();
                    return {
                        openNotifications: pathname === '/app/notifications' || Boolean(queryNotificationId),
                        notificationId: queryNotificationId,
                    };
                },

                syncRouteState(panel = this.activePanel, notificationId = this.selectedNotificationId) {
                    if (!window.history || typeof window.history.replaceState !== 'function') {
                        return;
                    }
                    const query = new URLSearchParams(window.location.search || '');
                    query.delete('notification_id');
                    query.delete('id');

                    if (panel === 'notifications' && notificationId) {
                        query.set('notification_id', String(notificationId));
                    }

                    const nextPath = panel === 'notifications' ? '/app/notifications' : '/app/';
                    const nextQuery = query.toString();
                    const nextUrl = nextQuery ? `${nextPath}?${nextQuery}` : nextPath;
                    window.history.replaceState({}, '', nextUrl);
                },

                switchActivePanel(panel, options = {}) {
                    const normalizedPanel = panel === 'notifications' ? 'notifications' : 'overview';
                    this.activePanel = normalizedPanel;

                    if (normalizedPanel === 'overview') {
                        this.selectedNotificationId = '';
                    } else {
                        if (this.notificationScopeCount(this.notificationScope) === 0 && this.notificationItems().length > 0) {
                            this.notificationScope = 'all';
                        }
                        if (!this.selectedNotificationId) {
                            const visibleItems = this.filteredNotificationItems();
                            const preferred = visibleItems.find((item) => !item.is_read)
                                || visibleItems[0]
                                || this.notificationItems()[0];
                            if (preferred) {
                                this.selectedNotificationId = String(preferred.id);
                            }
                        }
                    }

                    if (normalizedPanel === 'notifications' && this.accessToken && this.notificationItems().length === 0) {
                        void this.refreshNotifications(true);
                    }

                    if (options.syncUrl !== false) {
                        this.syncRouteState(this.activePanel, this.selectedNotificationId);
                    }
                },

                applyRouteIntent() {
                    const intent = this.routeIntent || this.parseRouteIntent();
                    if (!intent.openNotifications) {
                        this.switchActivePanel('overview', { syncUrl: false });
                        return;
                    }

                    this.switchActivePanel('notifications', { syncUrl: false });

                    if (intent.notificationId) {
                        const targetId = String(intent.notificationId);
                        const matched = this.notificationItems().find((item) => String(item.id) === targetId);
                        if (matched) {
                            this.notificationScope = 'all';
                            this.selectedNotificationId = targetId;
                        }
                    }

                    if (!this.selectedNotificationId) {
                        const visibleItems = this.filteredNotificationItems();
                        const preferred = visibleItems.find((item) => !item.is_read)
                            || visibleItems[0]
                            || this.notificationItems()[0];
                        if (preferred) {
                            this.selectedNotificationId = String(preferred.id);
                        }
                    }

                    this.syncRouteState('notifications', this.selectedNotificationId);
                },

                bindServiceWorkerNotificationEvents() {
                    if (!('serviceWorker' in navigator) || this.serviceWorkerMessageHandler) {
                        return;
                    }

                    this.serviceWorkerMessageHandler = async (event) => {
                        const payload = event?.data;
                        if (!payload || payload.type !== 'stockpy:notification-created' || !payload.notification) {
                            return;
                        }

                        try {
                            const saved = await this.upsertLocalNotificationRecord(payload.notification);
                            const merged = [
                                saved,
                                ...this.notificationItems().filter(
                                    (item) => String(item.id) !== String(saved.id),
                                ),
                            ];
                            this.backendSnapshot.notifications = this.sortNotificationsByTime(merged)
                                .slice(0, LOCAL_NOTIFICATION_MAX);
                        } catch (error) {
                            console.warn('Failed to persist incoming push notification locally', error);
                        }
                    };

                    navigator.serviceWorker.addEventListener('message', this.serviceWorkerMessageHandler);
                },

                isStandaloneDisplayMode() {
                    return Boolean(
                        window.matchMedia?.('(display-mode: standalone)').matches
                        || window.navigator?.standalone === true,
                    );
                },

                isIosLikeDevice() {
                    const ua = String(window.navigator?.userAgent || '').toLowerCase();
                    const platform = String(window.navigator?.platform || '');
                    const touchMac = platform === 'MacIntel' && Number(window.navigator?.maxTouchPoints || 0) > 1;
                    return /iphone|ipad|ipod/.test(ua) || touchMac;
                },

                detectPwaInstalledState() {
                    return this.isStandaloneDisplayMode() || document.referrer.startsWith('android-app://');
                },

                showInstallCard() {
                    return this.installInstalled || this.installReady || this.installManualMode || this.installSupported;
                },

                installButtonLabel() {
                    if (this.installBusy) {
                        return '处理中...';
                    }
                    if (this.installInstalled) {
                        return '已安装';
                    }
                    if (this.installReady) {
                        return '立即安装';
                    }
                    if (this.installManualMode) {
                        return '查看指引';
                    }
                    return '如何安装';
                },

                async setupInstallSupport() {
                    this.installInstalled = this.detectPwaInstalledState();
                    this.installManualMode = !this.installInstalled && this.isIosLikeDevice();
                    this.installSupported = Boolean(window.isSecureContext && 'serviceWorker' in navigator);
                    this.installStatus = this.installInstalled
                        ? '已安装到桌面，可从主屏幕直接打开。'
                        : (this.installManualMode
                            ? '在 Safari 点击“分享”，再选择“添加到主屏幕”。'
                            : '正在检测安装能力...');

                    if (!this.installSupported) {
                        if (!this.installInstalled && !this.installManualMode) {
                            this.installStatus = '当前环境不支持一键安装，请使用 HTTPS 或 localhost。';
                        }
                        return;
                    }

                    try {
                        await this.getPushRegistration();
                    } catch (error) {
                        console.warn('Failed to ensure service worker registration for install flow', error);
                    }

                    if (!this.installListenersBound) {
                        this.installListenersBound = true;

                        window.addEventListener('beforeinstallprompt', (event) => {
                            this.installDeferredPrompt = event;
                            this.installReady = typeof event?.prompt === 'function';
                            this.installManualMode = false;
                            this.installStatus = this.installReady
                                ? '浏览器已提供安装入口；也可点击按钮手动触发安装。'
                                : '浏览器已提供安装入口，可使用系统横幅或浏览器菜单完成安装。';
                        });

                        window.addEventListener('appinstalled', () => {
                            this.installInstalled = true;
                            this.installBusy = false;
                            this.installReady = false;
                            this.installManualMode = false;
                            this.installDeferredPrompt = null;
                            this.installStatus = '安装完成，可从主屏幕直接打开。';
                            this.showToast('应用已安装到主屏幕');
                        });
                    }

                    if (!this.installInstalled && !this.installManualMode && !this.installReady) {
                        this.installStatus = '可使用浏览器原生安装横幅，或在菜单中选择“安装应用”/“添加到主屏幕”。';
                    }
                },

                async triggerInstallApp() {
                    if (this.installBusy || this.installInstalled) {
                        return;
                    }

                    if (this.installManualMode) {
                        this.showToast('请在 Safari 的分享菜单中选择“添加到主屏幕”。');
                        return;
                    }

                    const promptEvent = this.installDeferredPrompt;
                    if (!promptEvent || typeof promptEvent.prompt !== 'function') {
                        this.showToast('请使用浏览器横幅、地址栏安装按钮或菜单中的安装入口。');
                        this.installStatus = '请使用浏览器原生安装横幅，或在菜单中选择“安装应用”/“添加到主屏幕”。';
                        return;
                    }

                    this.installBusy = true;
                    try {
                        await promptEvent.prompt();
                        const choice = await promptEvent.userChoice;
                        if (choice?.outcome === 'accepted') {
                            this.installStatus = '安装请求已提交，正在完成安装。';
                        } else {
                            this.installStatus = '已取消安装，可稍后再次尝试。';
                        }
                    } catch (error) {
                        this.installStatus = `安装触发失败：${error.message}`;
                    } finally {
                        this.installBusy = false;
                        this.installDeferredPrompt = null;
                        this.installReady = false;
                    }
                },

                startNotificationDeletePress(notificationId) {
                    const targetId = String(notificationId || '').trim();
                    if (!targetId) {
                        return;
                    }

                    this.stopNotificationDeletePress();
                    this.notificationDeletePressId = targetId;
                    this.notificationDeletePressTriggered = false;

                    this.notificationDeletePressTimer = window.setTimeout(async () => {
                        this.notificationDeletePressTimer = null;
                        this.notificationDeletePressTriggered = true;
                        await this.deleteNotification(targetId, {
                            requireConfirm: true,
                            showCancelToast: true,
                        });
                    }, 650);
                },

                stopNotificationDeletePress() {
                    if (this.notificationDeletePressTimer) {
                        clearTimeout(this.notificationDeletePressTimer);
                        this.notificationDeletePressTimer = null;
                    }
                    if (!this.notificationDeletePressTriggered) {
                        this.notificationDeletePressId = '';
                    }
                },

                resetNotificationDeletePress() {
                    this.stopNotificationDeletePress();
                    this.notificationDeletePressId = '';
                    this.notificationDeletePressTriggered = false;
                },

                idbRequest(request) {
                    return new Promise((resolve, reject) => {
                        request.onsuccess = () => resolve(request.result);
                        request.onerror = () => reject(request.error || new Error('IndexedDB request failed'));
                    });
                },

                idbTransactionDone(transaction) {
                    return new Promise((resolve, reject) => {
                        transaction.oncomplete = () => resolve();
                        transaction.onerror = () => reject(transaction.error || new Error('IndexedDB transaction failed'));
                        transaction.onabort = () => reject(transaction.error || new Error('IndexedDB transaction aborted'));
                    });
                },

                openLocalNotificationDb() {
                    return new Promise((resolve, reject) => {
                        if (!('indexedDB' in window)) {
                            reject(new Error('浏览器不支持本地通知存储'));
                            return;
                        }

                        const request = window.indexedDB.open(LOCAL_NOTIFICATION_DB, 1);
                        request.onupgradeneeded = () => {
                            const db = request.result;
                            if (!db.objectStoreNames.contains(LOCAL_NOTIFICATION_STORE)) {
                                db.createObjectStore(LOCAL_NOTIFICATION_STORE, { keyPath: 'id' });
                            }
                        };
                        request.onsuccess = () => resolve(request.result);
                        request.onerror = () => reject(request.error || new Error('打开本地通知存储失败'));
                    });
                },

                normalizeLocalNotificationRecord(raw) {
                    const value = raw && typeof raw === 'object' ? raw : {};
                    const metadata = value.metadata && typeof value.metadata === 'object' && !Array.isArray(value.metadata)
                        ? value.metadata
                        : {};
                    const notificationId = String(
                        value.notification_id || value.notificationId || metadata.notification_id || '',
                    ).trim();
                    const fallbackId = window.crypto?.randomUUID
                        ? window.crypto.randomUUID()
                        : `local-${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
                    const id = String(value.id || notificationId || fallbackId);

                    return {
                        id,
                        notification_id: notificationId || null,
                        type: String(
                            value.type || value.notification_type || metadata.notification_type || 'push',
                        ).trim() || 'push',
                        title: String(value.title || '系统通知'),
                        body: String(value.body || ''),
                        is_read: Boolean(value.is_read),
                        ack_required: Boolean(value.ack_required || metadata.ack_required),
                        acknowledged_at: value.acknowledged_at || null,
                        opened_at: value.opened_at || null,
                        created_at: value.created_at || new Date().toISOString(),
                        metadata,
                    };
                },

                sortNotificationsByTime(items) {
                    return [...(Array.isArray(items) ? items : [])]
                        .map((item) => this.normalizeLocalNotificationRecord(item))
                        .sort((a, b) => this.notificationTimestamp(b) - this.notificationTimestamp(a));
                },

                async listLocalNotifications(limit = LOCAL_NOTIFICATION_MAX) {
                    const db = await this.openLocalNotificationDb();
                    try {
                        const transaction = db.transaction(LOCAL_NOTIFICATION_STORE, 'readonly');
                        const store = transaction.objectStore(LOCAL_NOTIFICATION_STORE);
                        const records = await this.idbRequest(store.getAll());
                        await this.idbTransactionDone(transaction);
                        return this.sortNotificationsByTime(records)
                            .slice(0, Math.max(1, Number(limit) || LOCAL_NOTIFICATION_MAX));
                    } finally {
                        db.close();
                    }
                },

                async upsertLocalNotificationRecord(record, options = {}) {
                    const normalized = this.normalizeLocalNotificationRecord(record);
                    const db = await this.openLocalNotificationDb();
                    try {
                        const transaction = db.transaction(LOCAL_NOTIFICATION_STORE, 'readwrite');
                        const store = transaction.objectStore(LOCAL_NOTIFICATION_STORE);
                        const existing = await this.idbRequest(store.get(normalized.id));

                        const merged = existing && typeof existing === 'object'
                            ? { ...existing, ...normalized, id: normalized.id }
                            : normalized;

                        if (options.preserveLocalState !== false && existing && typeof existing === 'object') {
                            merged.is_read = Boolean(existing.is_read);
                            merged.opened_at = existing.opened_at || merged.opened_at || null;
                            merged.acknowledged_at = existing.acknowledged_at || merged.acknowledged_at || null;
                        }

                        store.put(merged);
                        await this.idbTransactionDone(transaction);
                        return this.normalizeLocalNotificationRecord(merged);
                    } finally {
                        db.close();
                    }
                },

                async deleteLocalNotificationRecord(notificationId) {
                    const targetId = String(notificationId || '').trim();
                    if (!targetId) {
                        return false;
                    }

                    const db = await this.openLocalNotificationDb();
                    try {
                        const transaction = db.transaction(LOCAL_NOTIFICATION_STORE, 'readwrite');
                        const store = transaction.objectStore(LOCAL_NOTIFICATION_STORE);
                        store.delete(targetId);
                        await this.idbTransactionDone(transaction);
                        return true;
                    } finally {
                        db.close();
                    }
                },

                async loadLocalNotifications(silent = true) {
                    try {
                        const items = await this.listLocalNotifications();
                        this.backendSnapshot.notifications = items;

                        if (this.selectedNotificationId) {
                            const exists = this.notificationItems().some(
                                (item) => String(item.id) === String(this.selectedNotificationId),
                            );
                            if (!exists) {
                                this.selectedNotificationId = '';
                            }
                        }

                        if (!this.selectedNotificationId && this.activePanel === 'notifications') {
                            const visibleItems = this.filteredNotificationItems();
                            const preferred = visibleItems.find((item) => !item.is_read)
                                || visibleItems[0]
                                || this.notificationItems()[0];
                            if (preferred) {
                                this.selectedNotificationId = String(preferred.id);
                            }
                        }

                        if (this.activePanel === 'notifications') {
                            this.syncRouteState('notifications', this.selectedNotificationId);
                        }

                        if (!silent) {
                            this.showToast('通知已从本地存储刷新');
                        }
                        return true;
                    } catch (error) {
                        if (!silent) {
                            this.showToast(`本地通知读取失败：${error.message}`);
                        }
                        return false;
                    }
                },

                notificationItems() {
                    return Array.isArray(this.backendSnapshot.notifications)
                        ? this.backendSnapshot.notifications
                        : [];
                },

                unreadNotificationCount() {
                    return this.notificationItems().filter((item) => !item.is_read).length;
                },

                notificationScopes() {
                    return [
                        { key: 'all', label: '全部' },
                        { key: 'unread', label: '未读' },
                        { key: 'read', label: '已读' },
                        { key: 'pending_ack', label: '待确认' },
                    ];
                },

                filterNotificationsByScope(scope = this.notificationScope) {
                    const items = this.notificationItems();
                    if (scope === 'unread') {
                        return items.filter((item) => !item.is_read);
                    }
                    if (scope === 'read') {
                        return items.filter((item) => Boolean(item.is_read));
                    }
                    if (scope === 'pending_ack') {
                        return items.filter((item) => item.ack_required && !item.acknowledged_at);
                    }
                    return items;
                },

                notificationScopeCount(scope) {
                    return this.filterNotificationsByScope(scope).length;
                },

                filteredNotificationItems() {
                    return this.filterNotificationsByScope(this.notificationScope);
                },

                normalizeNotificationType(type) {
                    const normalized = String(type || '').trim().toLowerCase();
                    return normalized || 'other';
                },

                notificationTypeLabel(type) {
                    const normalized = this.normalizeNotificationType(type);
                    const labels = {
                        signal: '信号提醒',
                        trade: '交易通知',
                        system: '系统通知',
                        account: '账户通知',
                        risk: '风控提醒',
                        subscription: '订阅变更',
                        portfolio: '持仓更新',
                        watchlist: '关注列表',
                        other: '其他通知',
                    };
                    return labels[normalized] || String(type || '其他通知');
                },

                notificationTimestamp(item) {
                    const parsed = Date.parse(item?.created_at || '');
                    return Number.isFinite(parsed) ? parsed : 0;
                },

                notificationGroups() {
                    const grouped = new Map();
                    for (const item of this.filteredNotificationItems()) {
                        const key = this.normalizeNotificationType(item.type);
                        if (!grouped.has(key)) {
                            grouped.set(key, {
                                key,
                                label: this.notificationTypeLabel(item.type),
                                items: [],
                            });
                        }
                        grouped.get(key).items.push(item);
                    }

                    const groups = Array.from(grouped.values());
                    for (const group of groups) {
                        group.items.sort((a, b) => this.notificationTimestamp(b) - this.notificationTimestamp(a));
                    }

                    groups.sort((a, b) => {
                        const unreadA = a.items.filter((item) => !item.is_read).length;
                        const unreadB = b.items.filter((item) => !item.is_read).length;
                        if (unreadA !== unreadB) {
                            return unreadB - unreadA;
                        }
                        if (a.items.length !== b.items.length) {
                            return b.items.length - a.items.length;
                        }
                        return a.label.localeCompare(b.label, 'zh-CN');
                    });
                    return groups;
                },

                setNotificationScope(scope) {
                    const available = this.notificationScopes().map((item) => item.key);
                    this.notificationScope = available.includes(scope) ? scope : 'all';

                    if (this.selectedNotificationId) {
                        const visible = this.filteredNotificationItems().some(
                            (item) => String(item.id) === String(this.selectedNotificationId),
                        );
                        if (!visible) {
                            this.selectedNotificationId = '';
                        }
                    }

                    if (!this.selectedNotificationId) {
                        const visibleItems = this.filteredNotificationItems();
                        const preferred = visibleItems.find((item) => !item.is_read)
                            || visibleItems[0];
                        if (preferred) {
                            this.selectedNotificationId = String(preferred.id);
                        }
                    }

                    if (this.activePanel === 'notifications') {
                        this.syncRouteState('notifications', this.selectedNotificationId);
                    }
                },

                selectedNotification() {
                    if (!this.selectedNotificationId) {
                        return null;
                    }
                    return this.notificationItems().find(
                        (item) => String(item.id) === String(this.selectedNotificationId),
                    ) || null;
                },

                updateNotificationLocal(notificationId, patch) {
                    const targetId = String(notificationId || '');
                    const currentItems = this.notificationItems();
                    const index = currentItems.findIndex((item) => String(item.id) === targetId);
                    if (index < 0) {
                        return;
                    }

                    this.backendSnapshot.notifications = [
                        ...currentItems.slice(0, index),
                        {
                            ...currentItems[index],
                            ...patch,
                        },
                        ...currentItems.slice(index + 1),
                    ];
                },

                async onNotificationCardClick(notificationId, options = {}) {
                    const targetId = String(notificationId || '').trim();
                    if (!targetId) {
                        this.resetNotificationDeletePress();
                        return;
                    }

                    if (
                        this.notificationDeletePressTriggered
                        && String(this.notificationDeletePressId) === targetId
                    ) {
                        this.resetNotificationDeletePress();
                        return;
                    }

                    this.resetNotificationDeletePress();
                    await this.openNotificationDetail(targetId, options);
                },

                async deleteNotification(notificationId, options = {}) {
                    const targetId = String(notificationId || '').trim();
                    if (!targetId) {
                        return false;
                    }

                    const currentItems = this.notificationItems();
                    const exists = currentItems.some((item) => String(item.id) === targetId);
                    if (!exists) {
                        return false;
                    }

                    if (options.requireConfirm) {
                        const targetItem = currentItems.find((item) => String(item.id) === targetId);
                        const title = String(targetItem?.title || '这条通知').trim();
                        const confirmed = window.confirm(`确认删除${title}？\n\n删除后无法恢复，仅影响当前设备本地通知。`);
                        if (!confirmed) {
                            if (options.showCancelToast) {
                                this.showToast('已取消删除');
                            }
                            return false;
                        }
                    }

                    try {
                        await this.deleteLocalNotificationRecord(targetId);

                        this.backendSnapshot.notifications = currentItems.filter(
                            (item) => String(item.id) !== targetId,
                        );

                        if (String(this.selectedNotificationId) === targetId) {
                            this.selectedNotificationId = '';
                            const visibleItems = this.filteredNotificationItems();
                            const preferred = visibleItems.find((item) => !item.is_read)
                                || visibleItems[0]
                                || this.notificationItems()[0];
                            if (preferred) {
                                this.selectedNotificationId = String(preferred.id);
                            }
                        }

                        if (this.activePanel === 'notifications') {
                            this.syncRouteState('notifications', this.selectedNotificationId);
                        }

                        if (!options.silent) {
                            this.showToast('通知已删除');
                        }
                        return true;
                    } catch (error) {
                        if (!options.silent) {
                            this.showToast(`删除通知失败（本地存储）：${error.message}`);
                        }
                        return false;
                    }
                },

                async openNotificationDetail(notificationId, options = {}) {
                    const targetId = String(notificationId || '').trim();
                    if (!targetId) {
                        return;
                    }
                    const item = this.notificationItems().find((row) => String(row.id) === targetId);
                    if (!item) {
                        if (!options.silent) {
                            this.showToast('未找到该通知，建议先刷新通知列表。');
                        }
                        return;
                    }

                    const visibleInCurrentScope = this.filteredNotificationItems().some(
                        (row) => String(row.id) === targetId,
                    );
                    if (!visibleInCurrentScope) {
                        this.notificationScope = 'all';
                    }

                    this.activePanel = 'notifications';
                    this.selectedNotificationId = targetId;

                    if (options.syncUrl !== false) {
                        this.syncRouteState('notifications', targetId);
                    }

                    if (options.markRead !== false && !item.is_read) {
                        await this.markNotificationRead(targetId, { silent: true, syncUrl: false });
                    }
                },

                async refreshNotifications(silent = false) {
                    await this.loadLocalNotifications(silent);
                },

                async markNotificationRead(notificationId, options = {}) {
                    const targetId = String(notificationId || '').trim();
                    if (!targetId) {
                        return false;
                    }

                    const item = this.notificationItems().find((row) => String(row.id) === targetId);
                    if (!item) {
                        return false;
                    }

                    try {
                        const patch = {
                            is_read: true,
                            opened_at: item.opened_at || new Date().toISOString(),
                        };
                        await this.upsertLocalNotificationRecord(
                            { ...item, ...patch },
                            { preserveLocalState: false },
                        );
                        this.updateNotificationLocal(targetId, patch);
                        if (this.activePanel === 'notifications' && options.syncUrl !== false) {
                            this.syncRouteState('notifications', this.selectedNotificationId || targetId);
                        }
                        if (!options.silent) {
                            this.showToast('已标记为已读');
                        }
                        return true;
                    } catch (error) {
                        if (!options.silent) {
                            this.showToast(`标记已读失败：${error.message}`);
                        }
                        return false;
                    }
                },

                async markAllNotificationsRead() {
                    const unreadItems = this.notificationItems().filter((item) => !item.is_read);
                    if (unreadItems.length === 0) {
                        return;
                    }

                    try {
                        const openedAt = new Date().toISOString();
                        const updatedItems = this.notificationItems().map((item) => (
                            item.is_read
                                ? item
                                : {
                                    ...item,
                                    is_read: true,
                                    opened_at: item.opened_at || openedAt,
                                }
                        ));
                        for (const item of updatedItems) {
                            await this.upsertLocalNotificationRecord(item, { preserveLocalState: false });
                        }
                        this.backendSnapshot.notifications = updatedItems;
                        this.showToast('已将通知全部标记为已读');
                    } catch (error) {
                        this.showToast(`批量标记失败（本地存储）：${error.message}`);
                    }
                },

                async acknowledgeNotification(notificationId) {
                    const targetId = String(notificationId || '').trim();
                    if (!targetId) {
                        return false;
                    }

                    const item = this.notificationItems().find((row) => String(row.id) === targetId);
                    if (!item) {
                        return false;
                    }

                    try {
                        const patch = {
                            is_read: true,
                            acknowledged_at: new Date().toISOString(),
                        };
                        await this.upsertLocalNotificationRecord(
                            { ...item, ...patch },
                            { preserveLocalState: false },
                        );
                        this.updateNotificationLocal(targetId, patch);
                        this.showToast('通知已确认');
                        return true;
                    } catch (error) {
                        this.showToast(`通知确认失败（本地存储）：${error.message}`);
                        return false;
                    }
                },

                loadSessionFromStorage() {
                    this.accessToken = localStorage.getItem(STORAGE_KEYS.accessToken) || '';
                    this.refreshToken = localStorage.getItem(STORAGE_KEYS.refreshToken) || '';
                    const rawUser = localStorage.getItem(STORAGE_KEYS.user);
                    this.currentUser = null;
                    if (rawUser) {
                        try {
                            this.currentUser = JSON.parse(rawUser);
                        } catch {
                            this.currentUser = null;
                        }
                    }
                },

                persistSession(sessionPayload) {
                    this.accessToken = sessionPayload?.access_token || '';
                    this.refreshToken = sessionPayload?.refresh_token || '';
                    this.currentUser = sessionPayload?.user || null;
                    if (this.accessToken) {
                        localStorage.setItem(STORAGE_KEYS.accessToken, this.accessToken);
                    }
                    if (this.refreshToken) {
                        localStorage.setItem(STORAGE_KEYS.refreshToken, this.refreshToken);
                    }
                    if (this.currentUser) {
                        localStorage.setItem(STORAGE_KEYS.user, JSON.stringify(this.currentUser));
                    }
                },

                clearSession() {
                    this.accessToken = '';
                    this.refreshToken = '';
                    this.currentUser = null;
                    this.activePanel = 'overview';
                    this.routeIntent = { openNotifications: false, notificationId: '' };
                    this.selectedNotificationId = '';
                    this.notificationScope = 'all';
                    this.pushConfigured = false;
                    this.pushPermission = this.pushSupported && window.Notification ? Notification.permission : 'default';
                    this.pushEnabled = false;
                    this.pushBusy = false;
                    this.pushStatus = '登录后可启用浏览器推送。';
                    this.resetNotificationDeletePress();
                    this.pushPublicKey = '';
                    this.pushServerId = '';
                    this.backendConnected = false;
                    this.backendLoading = false;
                    this.backendError = '';
                    this.backendSnapshot = {
                        profile: null,
                        dashboard: null,
                        portfolio: [],
                        watchlist: [],
                        notifications: []
                    };
                    this.lastBackendSyncAt = '';
                    this.step = 'login';
                    localStorage.removeItem(STORAGE_KEYS.accessToken);
                    localStorage.removeItem(STORAGE_KEYS.refreshToken);
                    localStorage.removeItem(STORAGE_KEYS.user);
                },

                decodeJwtPayload(token) {
                    const raw = String(token || '').trim();
                    const segments = raw.split('.');
                    if (segments.length < 2) {
                        return null;
                    }
                    try {
                        const normalized = segments[1]
                            .replace(/-/g, '+')
                            .replace(/_/g, '/');
                        const padding = '='.repeat((4 - (normalized.length % 4)) % 4);
                        const decoded = window.atob(normalized + padding);
                        return JSON.parse(decoded);
                    } catch {
                        return null;
                    }
                },

                tokenExpiresSoon(token, skewSeconds = 45) {
                    const payload = this.decodeJwtPayload(token);
                    const exp = Number(payload?.exp);
                    if (!Number.isFinite(exp) || exp <= 0) {
                        return false;
                    }
                    return (exp * 1000) <= (Date.now() + (Math.max(0, Number(skewSeconds) || 0) * 1000));
                },

                extractErrorMessage(payload, fallback) {
                    if (payload && typeof payload === 'object') {
                        let detail = payload.detail ?? payload.message ?? payload.code;
                        if (!detail && payload.error && typeof payload.error === 'object') {
                            detail = payload.error.message ?? payload.error.code;
                        }
                        if (!detail && payload.error && typeof payload.error === 'string') {
                            detail = payload.error;
                        }
                        if (detail && typeof detail === 'object') {
                            detail = JSON.stringify(detail);
                        }
                        if (detail) {
                            return String(detail);
                        }
                    }
                    return fallback;
                },

                extractCooldownSeconds(message, fallback = null) {
                    const text = String(message || '');
                    const englishMatch = text.match(/(\d+)\s*seconds?/i);
                    if (englishMatch) {
                        return Number(englishMatch[1]);
                    }
                    const chineseMatch = text.match(/(\d+)\s*秒/);
                    if (chineseMatch) {
                        return Number(chineseMatch[1]);
                    }
                    return fallback;
                },

                sendCodeButtonLabel() {
                    if (this.sendCodeBusy) {
                        return '发送中...';
                    }
                    if (this.sendCodeCooldownSeconds > 0) {
                        return `${this.sendCodeCooldownSeconds}s 后重试`;
                    }
                    return '获取验证码';
                },

                startSendCodeCooldown(seconds = 60) {
                    const cooldownSeconds = Math.max(0, Math.floor(Number(seconds) || 0));
                    if (this.sendCodeCooldownTimer) {
                        clearInterval(this.sendCodeCooldownTimer);
                        this.sendCodeCooldownTimer = null;
                    }
                    this.sendCodeCooldownSeconds = cooldownSeconds;
                    if (cooldownSeconds <= 0) {
                        return;
                    }
                    this.sendCodeCooldownTimer = setInterval(() => {
                        if (this.sendCodeCooldownSeconds <= 1) {
                            this.sendCodeCooldownSeconds = 0;
                            clearInterval(this.sendCodeCooldownTimer);
                            this.sendCodeCooldownTimer = null;
                            return;
                        }
                        this.sendCodeCooldownSeconds -= 1;
                    }, 1000);
                },

                async requestApi(method, path, options = {}) {
                    const { body, auth = true, retry = true } = options;
                    const headers = new Headers({ Accept: 'application/json' });
                    if (body !== undefined) {
                        headers.set('Content-Type', 'application/json');
                    }
                    if (auth && this.accessToken) {
                        headers.set('Authorization', `Bearer ${this.accessToken}`);
                    }

                    const response = await fetch(this.apiUrl(path), {
                        method,
                        headers,
                        body: body !== undefined ? JSON.stringify(body) : undefined,
                    });

                    const rawText = await response.text();
                    let payload = null;
                    try {
                        payload = rawText ? JSON.parse(rawText) : null;
                    } catch {
                        payload = null;
                    }

                    if (response.status === 401 && auth && retry && this.refreshToken) {
                        const refreshed = await this.refreshSession();
                        if (refreshed) {
                            return this.requestApi(method, path, { body, auth, retry: false });
                        }
                    }

                    if (!response.ok) {
                        const message = this.extractErrorMessage(payload, rawText || `HTTP ${response.status}`);
                        const error = new Error(message);
                        error.status = response.status;
                        error.payload = payload;
                        throw error;
                    }
                    return payload;
                },

                _refreshPromise: null,

                async refreshSession() {
                    if (!this.refreshToken) {
                        return false;
                    }
                    if (this._refreshPromise) {
                        return await this._refreshPromise;
                    }

                    this._refreshPromise = (async () => {
                        try {
                            const refreshed = await this.requestApi('POST', '/v1/auth/refresh', {
                                body: { refresh_token: this.refreshToken },
                                auth: false,
                                retry: false,
                            });
                            this.persistSession(refreshed);
                            return Boolean(this.accessToken);
                        } catch {
                            this.clearSession();
                            return false;
                        } finally {
                            this._refreshPromise = null;
                        }
                    })();

                    return await this._refreshPromise;
                },

                getPushDeviceId() {
                    if (this.pushDeviceId) {
                        return this.pushDeviceId;
                    }
                    const stored = localStorage.getItem(STORAGE_KEYS.pushDeviceId);
                    if (stored) {
                        this.pushDeviceId = stored;
                        return stored;
                    }
                    const generated = window.crypto?.randomUUID
                        ? window.crypto.randomUUID()
                        : `web-${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
                    this.pushDeviceId = generated;
