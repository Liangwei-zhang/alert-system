name: stock-py

x-app-environment: &app-environment
  ENVIRONMENT: production
  DEBUG: "false"
  PROJECT_NAME: StockPy API
  DATABASE_URL_FILE: /run/secrets/app_database_url
  DATABASE_POOL_MODE: pgbouncer
  PGBOUNCER_ADMIN_URL_FILE: /run/secrets/pgbouncer_admin_url
  REDIS_URL: redis://redis:6379/0
  EVENT_BROKER_BACKEND: kafka
  EVENT_BROKER_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  EVENT_BROKER_KAFKA_TOPIC: ${KAFKA_TOPIC_NAME:-stock-py.events}
  EVENT_BROKER_KAFKA_AUTO_OFFSET_RESET: earliest
  EVENT_OUTBOX_MAX_ATTEMPTS: ${EVENT_OUTBOX_MAX_ATTEMPTS:-3}
  OBJECT_STORAGE_BACKEND: s3
  OBJECT_STORAGE_BUCKET: stock-py
  OBJECT_STORAGE_PREFIX: runtime
  OBJECT_STORAGE_ENDPOINT_URL: http://minio:9000
  OBJECT_STORAGE_REGION: us-east-1
  OBJECT_STORAGE_ACCESS_KEY_ID_FILE: /run/secrets/minio_root_user
  OBJECT_STORAGE_SECRET_ACCESS_KEY_FILE: /run/secrets/minio_root_password
  OBJECT_STORAGE_FORCE_PATH_STYLE: "true"
  ANALYTICS_BACKEND: clickhouse
  CLICKHOUSE_HOST: clickhouse
  CLICKHOUSE_PORT: "8123"
  CLICKHOUSE_DATABASE: stock_py
  CLICKHOUSE_USERNAME: ${CLICKHOUSE_USERNAME:-stock_py}
  CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-stockpy-clickhouse}
  CLICKHOUSE_TABLE_TTL_DAYS: ${CLICKHOUSE_TABLE_TTL_DAYS:-180}
  SECRET_KEY_FILE: /run/secrets/app_secret_key
  TRADE_LINK_SECRET_FILE: /run/secrets/trade_link_secret
  INTERNAL_SIDECAR_SECRET: ${INTERNAL_SIDECAR_SECRET:-stock-py-internal-monitoring}
  RUNTIME_METRICS_WINDOW_MINUTES: ${RUNTIME_METRICS_WINDOW_MINUTES:-15}
  RUNTIME_ALERT_BROKER_LAG_THRESHOLD: ${RUNTIME_ALERT_BROKER_LAG_THRESHOLD:-200}
  RUNTIME_ALERT_PGBOUNCER_WAITING_CLIENTS_THRESHOLD: ${RUNTIME_ALERT_PGBOUNCER_WAITING_CLIENTS_THRESHOLD:-10}
  RUNTIME_ALERT_REDIS_MEMORY_PERCENT_THRESHOLD: ${RUNTIME_ALERT_REDIS_MEMORY_PERCENT_THRESHOLD:-85}
  RUNTIME_ALERT_CLICKHOUSE_WRITE_FAILURE_RATE_THRESHOLD: ${RUNTIME_ALERT_CLICKHOUSE_WRITE_FAILURE_RATE_THRESHOLD:-5}
  RUNTIME_ALERT_OBJECT_STORAGE_ARCHIVE_FAILURE_RATE_THRESHOLD: ${RUNTIME_ALERT_OBJECT_STORAGE_ARCHIVE_FAILURE_RATE_THRESHOLD:-5}

x-app-secrets: &app-secrets
  - app_database_url
  - pgbouncer_admin_url
  - app_secret_key
  - trade_link_secret
  - minio_root_user
  - minio_root_password

x-app-service: &app-service
  build:
    context: ..
    dockerfile: Dockerfile
  env_file:
    - ../.env
  init: true
  restart: unless-stopped
  stop_grace_period: 30s
  environment: *app-environment
  secrets: *app-secrets
  depends_on:
    postgres:
      condition: service_healthy
    pgbouncer:
      condition: service_healthy
    redis:
      condition: service_healthy
    kafka:
      condition: service_healthy
    kafka-setup:
      condition: service_completed_successfully
    clickhouse:
      condition: service_healthy
    minio:
      condition: service_healthy
    minio-setup:
      condition: service_completed_successfully
    migrate:
      condition: service_completed_successfully

x-worker-healthcheck: &worker-healthcheck
  test:
    [
      "CMD-SHELL",
      "python -m infra.observability.runtime_probe --kind $${RUNTIME_COMPONENT_KIND:-worker} --name $${RUNTIME_COMPONENT_NAME:?missing} --max-age-seconds $${RUNTIME_HEALTHCHECK_MAX_AGE_SECONDS:-90}",
    ]
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 45s

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    stop_grace_period: 60s
    environment:
      POSTGRES_DB: stock_py
      POSTGRES_USER: stock_py
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U stock_py -d stock_py"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    stop_grace_period: 30s
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--appendfsync",
        "everysec",
        "--maxmemory",
        "${REDIS_MAXMEMORY:-768mb}",
        "--maxmemory-policy",
        "${REDIS_MAXMEMORY_POLICY:-volatile-ttl}",
        "--maxmemory-samples",
        "10",
        "--lazyfree-lazy-eviction",
        "yes",
        "--lazyfree-lazy-expire",
        "yes",
        "--tcp-keepalive",
        "60",
      ]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

  pgbouncer:
    build:
      context: ./pgbouncer
      dockerfile: Dockerfile
    restart: unless-stopped
    stop_grace_period: 20s
    environment:
      PGBOUNCER_DB_HOST: postgres
      PGBOUNCER_DB_PORT: "5432"
      PGBOUNCER_DB_NAME: stock_py
      PGBOUNCER_DB_USER: stock_py
      PGBOUNCER_DB_PASSWORD_FILE: /run/secrets/postgres_password
      PGBOUNCER_ADMIN_USERS: stock_py
    secrets:
      - postgres_password
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PGBOUNCER_HOST_PORT:-6432}:6432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U stock_py -d stock_py"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: public.ecr.aws/bitnami/kafka@sha256:2c67261c163785156150c8399f3e32f66a99c69dbe1719aab22369d8c53a5825
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_CFG_NUM_PARTITIONS: ${KAFKA_TOPIC_PARTITIONS:-3}
      KAFKA_CFG_LOG_RETENTION_HOURS: ${KAFKA_LOG_RETENTION_HOURS:-168}
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
    ports:
      - "${KAFKA_HOST_PORT:-9092}:9092"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server 127.0.0.1:9092 --list >/dev/null 2>&1",
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 20s
    volumes:
      - kafka-data:/bitnami

  kafka-setup:
    image: public.ecr.aws/bitnami/kafka@sha256:2c67261c163785156150c8399f3e32f66a99c69dbe1719aab22369d8c53a5825
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint:
      [
        "/bin/sh",
        "-ec",
        "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic ${KAFKA_TOPIC_NAME:-stock-py.events} --partitions ${KAFKA_TOPIC_PARTITIONS:-3} --replication-factor 1 --config cleanup.policy=delete --config retention.ms=${KAFKA_TOPIC_RETENTION_MS:-604800000}",
      ]

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      CLICKHOUSE_DB: stock_py
      CLICKHOUSE_USER: ${CLICKHOUSE_USERNAME:-stock_py}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-stockpy-clickhouse}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "${CLICKHOUSE_HTTP_HOST_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_HOST_PORT:-9000}:9000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    restart: unless-stopped
    stop_grace_period: 30s
    entrypoint: ["/bin/sh", "/etc/minio/entrypoint.sh"]
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_root_user
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
    secrets:
      - minio_root_user
      - minio_root_password
    ports:
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
      - "${MINIO_API_HOST_PORT:-9002}:9000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - minio-data:/data
      - ./minio/entrypoint.sh:/etc/minio/entrypoint.sh:ro

  minio-setup:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    secrets:
      - minio_root_user
      - minio_root_password
    volumes:
      - ./minio/lifecycle.json:/config/lifecycle.json:ro
    entrypoint:
      [
        "/bin/sh",
        "-ec",
        "MINIO_USER=$$(cat /run/secrets/minio_root_user) && MINIO_PASS=$$(cat /run/secrets/minio_root_password) && mc alias set local http://minio:9000 \"$$MINIO_USER\" \"$$MINIO_PASS\" && mc mb --ignore-existing local/stock-py && mc ilm import local/stock-py < /config/lifecycle.json",
      ]

  mc:
    profiles: ["ops"]
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    restart: "no"
    secrets:
      - minio_root_user
      - minio_root_password
    volumes:
      - ${OPS_BACKUP_DIR:-./backups}:/backup

  migrate:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: "no"
    command: ["python", "-m", "alembic", "upgrade", "head"]
    environment:
      <<: *app-environment
      DATABASE_URL_FILE: /run/secrets/direct_database_url
      DATABASE_POOL_MODE: direct
    secrets:
      - direct_database_url
      - pgbouncer_admin_url
      - app_secret_key
      - trade_link_secret
      - minio_root_user
      - minio_root_password
    depends_on:
      postgres:
        condition: service_healthy

  public-api:
    <<: *app-service
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "apps.public_api.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health/ready >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  admin-api:
    <<: *app-service
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "apps.admin_api.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8001",
      ]
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8001/health/ready >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  scheduler:
    <<: *app-service
    environment:
      <<: *app-environment
      RUNTIME_COMPONENT_KIND: scheduler
      RUNTIME_COMPONENT_NAME: scheduler
      RUNTIME_HEALTHCHECK_MAX_AGE_SECONDS: "120"
    command: ["python", "-m", "apps.scheduler.main"]
    healthcheck: *worker-healthcheck

  event-pipeline:
    <<: *app-service
    environment:
      <<: *app-environment
      RUNTIME_COMPONENT_KIND: worker
      RUNTIME_COMPONENT_NAME: event-pipeline
      RUNTIME_HEALTHCHECK_MAX_AGE_SECONDS: "90"
    command: ["python", "-m", "apps.workers.event_pipeline.worker"]
    healthcheck: *worker-healthcheck

  retention:
    <<: *app-service
    environment:
      <<: *app-environment
      RUNTIME_COMPONENT_KIND: worker
      RUNTIME_COMPONENT_NAME: retention
      RUNTIME_HEALTHCHECK_MAX_AGE_SECONDS: "7200"
    command: ["python", "-m", "apps.workers.retention.worker"]
    healthcheck: *worker-healthcheck

  tradingagents-bridge:
    <<: *app-service
    environment:
      <<: *app-environment
      RUNTIME_COMPONENT_KIND: worker
      RUNTIME_COMPONENT_NAME: tradingagents-bridge
      RUNTIME_HEALTHCHECK_MAX_AGE_SECONDS: "90"
    command: ["python", "-m", "apps.workers.tradingagents_bridge.worker"]
    healthcheck: *worker-healthcheck

  cold-storage:
    <<: *app-service
    profiles: ["jobs"]
    restart: "no"
    command: ["python", "-m", "apps.workers.cold_storage.worker"]

  receipt-escalation:
    <<: *app-service
    profiles: ["jobs"]
    restart: "no"
    command: ["python", "-m", "apps.workers.receipt_escalation.worker"]

  scanner:
    <<: *app-service
    profiles: ["jobs"]
    restart: "no"
    command: ["python", "-m", "apps.workers.scanner.worker"]

  market-data:
    <<: *app-service
    profiles: ["jobs"]
    restart: "no"
    command: ["python", "-m", "apps.workers.market_data.worker"]

  backtest:
    <<: *app-service
    profiles: ["jobs"]
    restart: "no"
    command: ["python", "-m", "apps.workers.backtest.worker"]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      public-api:
        condition: service_healthy
      admin-api:
        condition: service_healthy
    ports:
      - "${NGINX_HOST_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  clickhouse-data:
  minio-data:

secrets:
  app_database_url:
    file: ${OPS_SECRET_DIR:-./secrets/dev}/app_database_url.txt
  direct_database_url:
    file: ${OPS_SECRET_DIR:-./secrets/dev}/direct_database_url.txt
  pgbouncer_admin_url:
    file: ${OPS_SECRET_DIR:-./secrets/dev}/pgbouncer_admin_url.txt
  app_secret_key:
    file: ${OPS_SECRET_DIR:-./secrets/dev}/app_secret_key.txt
  trade_link_secret:
    file: ${OPS_SECRET_DIR:-./secrets/dev}/trade_link_secret.txt
  postgres_password:
    file: ${OPS_SECRET_DIR:-./secrets/dev}/postgres_password.txt
  minio_root_user:
    file: ${OPS_SECRET_DIR:-./secrets/dev}/minio_root_user.txt
  minio_root_password:
    file: ${OPS_SECRET_DIR:-./secrets/dev}/minio_root_password.txt