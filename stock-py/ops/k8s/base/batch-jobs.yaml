apiVersion: batch/v1
kind: CronJob
metadata:
  name: market-data-refresh
spec:
  schedule: "5 * * * 1-5"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/component: market-data-refresh
        spec:
          restartPolicy: OnFailure
          containers:
            - name: market-data-refresh
              image: ghcr.io/openclaw/stock-py:latest
              imagePullPolicy: IfNotPresent
              command: ["python", "-m", "apps.workers.market_data.worker"]
              env:
                - name: RUNTIME_COMPONENT_KIND
                  value: worker
                - name: RUNTIME_COMPONENT_NAME
                  value: market-data-refresh
              envFrom:
                - configMapRef:
                    name: stock-py-runtime
                - secretRef:
                    name: stock-py-app-secrets
---
