apiVersion: v1
kind: ConfigMap
metadata:
  name: stock-py-runtime
data:
  PROJECT_NAME: StockPy API
  ENVIRONMENT: production
  DEBUG: "false"
  LOG_LEVEL: INFO
  DATABASE_POOL_MODE: pgbouncer
  PUBLIC_API_PORT: "8000"
  ADMIN_API_PORT: "8001"
  REDIS_URL: redis://redis.platform.svc.cluster.local:6379/0
  EVENT_BROKER_BACKEND: kafka
  EVENT_BROKER_KAFKA_BOOTSTRAP_SERVERS: kafka.platform.svc.cluster.local:9092
  EVENT_BROKER_KAFKA_TOPIC: stock-py.events
  EVENT_BROKER_KAFKA_AUTO_OFFSET_RESET: earliest
  EVENT_OUTBOX_MAX_ATTEMPTS: "3"
  ANALYTICS_BACKEND: clickhouse
  CLICKHOUSE_HOST: clickhouse.platform.svc.cluster.local
  CLICKHOUSE_PORT: "8123"
  CLICKHOUSE_DATABASE: stock_py
  OBJECT_STORAGE_BACKEND: s3
  OBJECT_STORAGE_BUCKET: stock-py
  OBJECT_STORAGE_ENDPOINT_URL: https://s3.example.com
  OBJECT_STORAGE_REGION: us-east-1
  OBJECT_STORAGE_FORCE_PATH_STYLE: "false"
  RUNTIME_METRICS_WINDOW_MINUTES: "15"
  RUNTIME_ALERT_BROKER_LAG_THRESHOLD: "200"
  RUNTIME_ALERT_PGBOUNCER_WAITING_CLIENTS_THRESHOLD: "10"
  RUNTIME_ALERT_REDIS_MEMORY_PERCENT_THRESHOLD: "85"
  RUNTIME_ALERT_CLICKHOUSE_WRITE_FAILURE_RATE_THRESHOLD: "5"
  RUNTIME_ALERT_OBJECT_STORAGE_ARCHIVE_FAILURE_RATE_THRESHOLD: "5"