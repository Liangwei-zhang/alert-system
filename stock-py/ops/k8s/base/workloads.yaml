apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stock-py
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
spec:
  ingressClassName: nginx
  rules:
    - host: stock-py.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: public-api
                port:
                  number: 8000
          - path: /v1/admin
            pathType: Prefix
            backend:
              service:
                name: admin-api
                port:
                  number: 8001