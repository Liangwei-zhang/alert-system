apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/component: scheduler
    spec:
      containers:
        - name: scheduler
          image: ghcr.io/openclaw/stock-py:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "apps.scheduler.main"]
          env:
            - name: RUNTIME_COMPONENT_KIND
              value: scheduler
            - name: RUNTIME_COMPONENT_NAME
              value: scheduler
            - name: RUNTIME_HEALTHCHECK_MAX_AGE_SECONDS
              value: "120"
          envFrom:
            - configMapRef:
                name: stock-py-runtime
            - secretRef:
                name: stock-py-app-secrets
          readinessProbe:
            exec:
              command:
                ["python", "-m", "infra.observability.runtime_probe", "--kind", "scheduler", "--name", "scheduler", "--max-age-seconds", "120"]
          livenessProbe:
            exec:
              command:
                ["python", "-m", "infra.observability.runtime_probe", "--kind", "scheduler", "--name", "scheduler", "--max-age-seconds", "120"]
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
