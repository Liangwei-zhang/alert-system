apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: ghcr.io/openclaw/stock-py:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: stock-py-runtime
            - secretRef:
                name: stock-py-app-secrets
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: public-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/component: public-api
  template:
    metadata:
      labels:
        app.kubernetes.io/component: public-api
    spec:
      containers:
        - name: public-api
          image: ghcr.io/openclaw/stock-py:latest
          imagePullPolicy: IfNotPresent
          command:
            ["python", "-m", "uvicorn", "apps.public_api.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: stock-py-runtime
            - secretRef:
                name: stock-py-app-secrets
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: public-api
spec:
  selector:
    app.kubernetes.io/component: public-api
  ports:
    - name: http
      port: 8000
      targetPort: http
---
