apiVersion: v1
kind: ConfigMap
metadata:
  name: stock-py-runtime
data:
  ENVIRONMENT: production
  REDIS_URL: redis://redis.production.platform.svc.cluster.local:6379/0
  EVENT_BROKER_KAFKA_BOOTSTRAP_SERVERS: kafka.production.platform.svc.cluster.local:9092
  CLICKHOUSE_HOST: clickhouse.production.platform.svc.cluster.local
  OBJECT_STORAGE_ENDPOINT_URL: https://s3.example.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: public-api
spec:
  replicas: 3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-api
spec:
  replicas: 2
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: public-api
spec:
  minReplicas: 3
  maxReplicas: 10
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: admin-api
spec:
  minReplicas: 2
  maxReplicas: 6
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stock-py
spec:
  rules:
    - host: stock-py.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: public-api
                port:
                  number: 8000
          - path: /v1/admin
            pathType: Prefix
            backend:
              service:
                name: admin-api
                port:
                  number: 8001