apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/environment: production
    app.kubernetes.io/name: stock-py
    app.kubernetes.io/part-of: stock-py
  name: admin-api
  namespace: stock-py
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/component: admin-api
  template:
    metadata:
      labels:
        app.kubernetes.io/component: admin-api
    spec:
      containers:
      - command:
        - python
        - -m
        - uvicorn
        - apps.admin_api.main:app
        - --host
        - 0.0.0.0
        - --port
        - "8001"
        envFrom:
        - configMapRef:
            name: stock-py-runtime
        - secretRef:
            name: stock-py-app-secrets
        image: ghcr.io/openclaw/stock-py:latest
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
          initialDelaySeconds: 20
          periodSeconds: 20
        name: admin-api
        ports:
        - containerPort: 8001
          name: http
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 15
        resources:
          limits:
            cpu: "1"
            memory: 768Mi
          requests:
            cpu: 250m
            memory: 256Mi
