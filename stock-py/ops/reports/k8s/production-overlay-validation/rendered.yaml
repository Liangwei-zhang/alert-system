apiVersion: v1
kind: Namespace
metadata:
  labels:
    app.kubernetes.io/environment: production
    app.kubernetes.io/name: stock-py
    app.kubernetes.io/part-of: stock-py
  name: stock-py
---
apiVersion: v1
data:
  stock-py-runtime.json: |-
    {
      "title": "stock-py Runtime",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "panels": [
        {
          "type": "timeseries",
          "title": "Public API Request Rate",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "sum(rate(stock_signal_public_http_requests_total[5m]))",
              "legendFormat": "requests/s"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Public API Error Rate",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [
            {
              "expr": "sum(rate(stock_signal_public_http_request_errors_total[5m])) / clamp_min(sum(rate(stock_signal_public_http_requests_total[5m])), 1)",
              "legendFormat": "error rate"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Public API P95 Latency",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "targets": [
            {
              "expr": "stock_signal_public_http_request_duration_ms_p95",
              "legendFormat": "p95 ms"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Admin API Request Rate",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "targets": [
            {
              "expr": "sum(rate(stock_signal_admin_admin_http_requests_total[5m]))",
              "legendFormat": "requests/s"
            }
          ]
        }
      ]
    }
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/environment: production
    app.kubernetes.io/name: stock-py
    app.kubernetes.io/part-of: stock-py
    grafana_dashboard: "1"
  name: grafana-dashboard-stock-py-runtime
  namespace: stock-py
---
apiVersion: v1
data:
  ADMIN_API_PORT: "8001"
  ANALYTICS_BACKEND: clickhouse
  CLICKHOUSE_DATABASE: stock
  CLICKHOUSE_HOST: clickhouse.production.platform.svc.cluster.local
  CLICKHOUSE_PORT: "8123"
  DATABASE_POOL_MODE: pgbouncer
  DEBUG: "false"
  ENVIRONMENT: production
  EVENT_BROKER_BACKEND: kafka
  EVENT_BROKER_KAFKA_AUTO_OFFSET_RESET: earliest
  EVENT_BROKER_KAFKA_BOOTSTRAP_SERVERS: kafka.production.platform.svc.cluster.local:9092
  EVENT_BROKER_KAFKA_TOPIC: stock-py.events
  EVENT_OUTBOX_MAX_ATTEMPTS: "3"
  LOG_LEVEL: INFO
  OBJECT_STORAGE_BACKEND: s3
  OBJECT_STORAGE_BUCKET: stock-py
  OBJECT_STORAGE_ENDPOINT_URL: https://s3.example.com
  OBJECT_STORAGE_FORCE_PATH_STYLE: "false"
  OBJECT_STORAGE_REGION: us-east-1
  PROJECT_NAME: Stock API
  PUBLIC_API_PORT: "8000"
  REDIS_URL: redis://redis.production.platform.svc.cluster.local:6379/0
  RUNTIME_ALERT_BROKER_LAG_THRESHOLD: "200"
  RUNTIME_ALERT_CLICKHOUSE_WRITE_FAILURE_RATE_THRESHOLD: "5"
  RUNTIME_ALERT_OBJECT_STORAGE_ARCHIVE_FAILURE_RATE_THRESHOLD: "5"
  RUNTIME_ALERT_PGBOUNCER_WAITING_CLIENTS_THRESHOLD: "10"
  RUNTIME_ALERT_REDIS_MEMORY_PERCENT_THRESHOLD: "85"
  RUNTIME_METRICS_WINDOW_MINUTES: "15"
