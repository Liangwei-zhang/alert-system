apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    app.kubernetes.io/environment: production
    app.kubernetes.io/name: stock-py
    app.kubernetes.io/part-of: stock-py
  name: stock-py-runtime
  namespace: stock-py
spec:
  groups:
  - name: stock-py.api
    rules:
    - alert: StockPyPublicApiHighErrorRate
      annotations:
        summary: Public API error rate is above 5%
      expr: rate(stock_signal_public_http_request_errors_total[5m]) / clamp_min(rate(stock_signal_public_http_requests_total[5m]),
        1) > 0.05
      for: 10m
      labels:
        severity: warning
    - alert: StockPyPublicApiHighLatency
      annotations:
        summary: Public API p95 latency is above 750 ms
      expr: stock_signal_public_http_request_duration_ms_p95 > 750
      for: 10m
      labels:
        severity: warning
    - alert: StockPyAdminApiHighErrorRate
      annotations:
        summary: Admin API error rate is above 5%
      expr: rate(stock_signal_admin_admin_http_request_errors_total[5m]) / clamp_min(rate(stock_signal_admin_admin_http_requests_total[5m]),
        1) > 0.05
      for: 10m
      labels:
        severity: warning
    - alert: StockPyBrokerLagHigh
      annotations:
        summary: Broker consumer lag is above 200
      expr: max(stock_signal_admin_event_broker_consumer_lag_total) > 200
      for: 10m
      labels:
        severity: warning
    - alert: StockPyPgBouncerWaitingHigh
      annotations:
        summary: PgBouncer waiting clients are above 10
      expr: max(stock_signal_admin_pgbouncer_clients_waiting) > 10
      for: 10m
      labels:
        severity: warning
    - alert: StockPyRedisMemoryHigh
      annotations:
        summary: Redis memory utilization is above 85%
      expr: max(stock_signal_admin_redis_memory_utilization_percent) > 85
      for: 10m
      labels:
        severity: warning
    - alert: StockPyClickHouseWriteFailureRateHigh
      annotations:
        summary: ClickHouse write failure rate is above 5%
      expr: max(stock_signal_admin_clickhouse_write_failure_rate_percent) > 5
      for: 15m
      labels:
        severity: critical
    - alert: StockPyObjectStorageArchiveFailureRateHigh
      annotations:
        summary: Object storage archive failure rate is above 5%
      expr: max(stock_signal_admin_object_storage_archive_failure_rate_percent) >
        5
      for: 15m
      labels:
        severity: critical
---
apiVersion: monitoring.coreos.com/v1
