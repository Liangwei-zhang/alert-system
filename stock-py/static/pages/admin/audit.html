<head>
  <meta charset="utf-8" />

  <style>
    @import url("https://rsms.me/inter/inter.css");
  </style>
</head>
<body>
  <div class="page">
    <!-- Sidebar -->
    <aside class="sidebar sidebar-dark d-none d-md-block" style="position: fixed; left: 0; top: 0; bottom: 0; width: 260px; z-index: 1000;">
      <div class="sidebar-brand p-3 text-center">
        <a href="/pages/dashboard.html" class="text-white text-decoration-none">
          <svg xmlns="http://www.w3.org/2000/svg" width="120" height="32" viewBox="0 0 232 68">
            <path d="M64.6 16.2C63 9.9 58.1 5 51.8 3.4 40 1.5 28 1.5 16.2 3.4 9.9 5 5 9.9 3.4 16.2 1.5 28 1.5 40 3.4 51.8 5 58.1 9.9 63 16.2 64.6c11.8 1.9 23.8 1.9 35.6 0C58.1 63 63 58.1 64.6 51.8c1.9-11.8 1.9-23.8 0-35.6z" fill="#066fd1"/>
            <path d="M105 40l5-5 5 5 10-10-5-5 5-5-10-10-5 5-5-5-10 10 5 5-5 5 10 10zm20-15l5-5-5-5-5 5z" fill="#fff"/>
          </svg>
        </a>
        <div class="text-muted small mt-1">Admin Panel</div>
      </div>
      <ul class="nav nav-vertical py-2">
        <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="users.html">Users</a></li>
        <li class="nav-item"><a class="nav-link" href="subscriptions.html">Subscriptions</a></li>
        <li class="nav-item"><a class="nav-link" href="tasks.html">Tasks</a></li>
        <li class="nav-item"><a class="nav-link active" href="audit.html">Audit Logs</a></li>
        <li class="nav-item"><a class="nav-link" href="push.html">Push / Devices</a></li>
        <li class="nav-item mt-4"><a class="nav-link text-muted" href="/pages/dashboard.html">← Back to App</a></li>
      </ul>
    </aside>

    <!-- Main -->
    <div class="page-main" style="margin-left: 260px;">
      <header class="navbar navbar-expand-md d-print-none border-bottom">
        <div class="container-xl">
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#sidebar-menu">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="navbar-nav"><span class="text-muted">Audit Logs</span></div>
        </div>
      </header>

      <div class="container-xl py-4">
        <h1 class="mb-4">Audit Logs</h1>

        <!-- Filters -->
        <div class="card mb-4">
          <div class="card-body">
            <div class="row g-3">
              <div class="col-md-3">
                <input type="text" class="form-control" id="search-input" placeholder="Search user or action..." />
              </div>
              <div class="col-md-2">
                <select class="form-select" id="action-filter">
                  <option value="">All Actions</option>
                  <option value="login">Login</option>
                  <option value="logout">Logout</option>
                  <option value="create">Create</option>
                  <option value="update">Update</option>
                  <option value="delete">Delete</option>
                </select>
              </div>
              <div class="col-md-2">
                <select class="form-select" id="resource-filter">
                  <option value="">All Resources</option>
                  <option value="user">User</option>
                  <option value="subscription">Subscription</option>
                  <option value="signal">Signal</option>
                  <option value="task">Task</option>
                </select>
              </div>
              <div class="col-md-3">
                <input type="date" class="form-control" id="date-from" placeholder="From" />
              </div>
              <div class="col-md-2">
                <input type="date" class="form-control" id="date-to" placeholder="To" />
              </div>
            </div>
          </div>
        </div>

        <!-- Logs Table -->
        <div class="card">
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead>
                <tr>
                  <th>Timestamp</th>
                  <th>User</th>
                  <th>Action</th>
                  <th>Resource</th>
                  <th>Details</th>
                  <th>IP Address</th>
                </tr>
              </thead>
              <tbody id="logs-tbody">
                <tr><td colspan="6" class="text-center py-4">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Pagination -->
        <div class="mt-3 d-flex justify-content-between align-items-center">
          <span class="text-muted" id="page-info"></span>
          <div>
            <button class="btn btn-sm btn-outline-secondary" id="prev-btn">Previous</button>
            <button class="btn btn-sm btn-outline-secondary" id="next-btn">Next</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../../dist/js/tabler.min.js"></script>
  <script>
    let currentPage = 0, pageSize = 50;

    // Sample audit log data (replace with actual API call)
    const mockLogs = [
      { id: 1, timestamp: '2026-04-04T10:30:00Z', user: 'admin', action: 'login', resource: 'user', details: 'Admin login', ip: '192.168.1.1' },
      { id: 2, timestamp: '2026-04-04T10:25:00Z', user: 'operator1', action: 'create', resource: 'signal', details: 'Created signal AAPL', ip: '192.168.1.2' },
      { id: 3, timestamp: '2026-04-04T10:20:00Z', user: 'admin', action: 'update', resource: 'subscription', details: 'Updated tier to pro', ip: '192.168.1.1' },
      { id: 4, timestamp: '2026-04-04T10:15:00Z', user: 'viewer1', action: 'login', resource: 'user', details: 'User login', ip: '192.168.1.3' },
      { id: 5, timestamp: '2026-04-04T10:10:00Z', user: 'admin', action: 'delete', resource: 'task', details: 'Deleted old task', ip: '192.168.1.1' },
    ];

    function renderLogs(logs) {
      const tbody = document.getElementById('logs-tbody');
      if (!logs.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4">No logs found</td></tr>';
        return;
      }
      tbody.innerHTML = logs.map(l => `
        <tr>
          <td><span class="text-muted">${new Date(l.timestamp).toLocaleString()}</span></td>
          <td><strong>${l.user}</strong></td>
          <td><span class="badge bg-${l.action === 'delete' ? 'danger' : l.action === 'create' ? 'success' : l.action === 'update' ? 'warning' : 'secondary'}">${l.action}</span></td>
          <td>${l.resource}</td>
          <td>${l.details || '-'}</td>
          <td><code>${l.ip}</code></td>
        </tr>
      `).join('');
      document.getElementById('page-info').textContent = `Showing ${logs.length} entries`;
    }

    function loadLogs() {
      renderLogs(mockLogs);
    }

    document.getElementById('prev-btn').onclick = () => { if (currentPage > 0) { currentPage--; loadLogs(); }};
    document.getElementById('next-btn').onclick = () => { currentPage++; loadLogs(); };

    loadLogs();
  </script>
</body>
</html>
