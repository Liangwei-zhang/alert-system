<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Subscriptions - Stock-py Admin</title>
  <link href="../../dist/css/tabler.css" rel="stylesheet" />
  <link href="../../dist/css/tabler-vendors.css" rel="stylesheet" />
  <script src="../../dist/js/tabler-theme.min.js"></script>
  <style>
    @import url("https://rsms.me/inter/inter.css");
    .badge-tier { font-size: 0.75rem; }
  </style>
</head>
<body>
  <div class="page">
    <!-- Sidebar -->
    <aside class="sidebar sidebar-dark d-none d-md-block" style="position: fixed; left: 0; top: 0; bottom: 0; width: 260px; z-index: 1000;">
      <div class="sidebar-brand p-3 text-center">
        <a href="/pages/dashboard.html" class="text-white text-decoration-none">
          <svg xmlns="http://www.w3.org/2000/svg" width="120" height="32" viewBox="0 0 232 68">
            <path d="M64.6 16.2C63 9.9 58.1 5 51.8 3.4 40 1.5 28 1.5 16.2 3.4 9.9 5 5 9.9 3.4 16.2 1.5 28 1.5 40 3.4 51.8 5 58.1 9.9 63 16.2 64.6c11.8 1.9 23.8 1.9 35.6 0C58.1 63 63 58.1 64.6 51.8c1.9-11.8 1.9-23.8 0-35.6z" fill="#066fd1"/>
            <path d="M105 40l5-5 5 5 10-10-5-5 5-5-10-10-5 5-5-5-10 10 5 5-5 5 10 10zm20-15l5-5-5-5-5 5z" fill="#fff"/>
          </svg>
        </a>
        <div class="text-muted small mt-1">Admin Panel</div>
      </div>
      <ul class="nav nav-vertical py-2">
        <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="users.html">Users</a></li>
        <li class="nav-item"><a class="nav-link active" href="subscriptions.html">Subscriptions</a></li>
        <li class="nav-item"><a class="nav-link" href="tasks.html">Tasks</a></li>
        <li class="nav-item"><a class="nav-link" href="audit.html">Audit Logs</a></li>
        <li class="nav-item"><a class="nav-link" href="push.html">Push / Devices</a></li>
        <li class="nav-item mt-4"><a class="nav-link text-muted" href="/pages/dashboard.html">← Back to App</a></li>
      </ul>
    </aside>

    <!-- Main -->
    <div class="page-main" style="margin-left: 260px;">
      <header class="navbar navbar-expand-md d-print-none border-bottom">
        <div class="container-xl">
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#sidebar-menu">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="navbar-nav"><span class="text-muted">Subscriptions</span></div>
        </div>
      </header>

      <div class="container-xl py-4">
        <h1 class="mb-4">Subscription Management</h1>

        <!-- Stats -->
        <div class="row g-3 mb-4" id="sub-stats">
          <div class="col-6 col-md-3">
            <div class="card">
              <div class="card-body text-center">
                <div class="h3 mb-0" id="stat-total">-</div>
                <div class="text-muted">Total</div>
              </div>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="card">
              <div class="card-body text-center">
                <div class="h3 mb-0" id="stat-active">-</div>
                <div class="text-muted">Active</div>
              </div>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="card">
              <div class="card-body text-center">
                <div class="h3 mb-0" id="stat-trial">-</div>
                <div class="text-muted">Trial</div>
              </div>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="card">
              <div class="card-body text-center">
                <div class="h3 mb-0" id="stat-past-due">-</div>
                <div class="text-muted">Past Due</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Filters -->
        <div class="card mb-4">
          <div class="card-body">
            <div class="row g-3">
              <div class="col-md-4">
                <input type="text" class="form-control" id="search-input" placeholder="Search by user ID..." />
              </div>
              <div class="col-md-3">
                <select class="form-select" id="status-filter">
                  <option value="">All Status</option>
                  <option value="active">Active</option>
                  <option value="trialing">Trial</option>
                  <option value="past_due">Past Due</option>
                  <option value="canceled">Canceled</option>
                </select>
              </div>
              <div class="col-md-3">
                <select class="form-select" id="tier-filter">
                  <option value="">All Tiers</option>
                  <option value="free">Free</option>
                  <option value="basic">Basic</option>
                  <option value="pro">Pro</option>
                  <option value="enterprise">Enterprise</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <!-- Subscriptions Table -->
        <div class="card">
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>User ID</th>
                  <th>Tier</th>
                  <th>Status</th>
                  <th>Signals/Day</th>
                  <th>Features</th>
                  <th>Created</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="subs-tbody">
                <tr><td colspan="8" class="text-center py-4">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div class="modal fade" id="subModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Edit Subscription</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="sub-form">
            <input type="hidden" id="sub-id" />
            <div class="mb-3">
              <label class="form-label">Tier</label>
              <select class="form-select" id="sub-tier">
                <option value="free">Free</option>
                <option value="basic">Basic</option>
                <option value="pro">Pro</option>
                <option value="enterprise">Enterprise</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">Status</label>
              <select class="form-select" id="sub-status">
                <option value="active">Active</option>
                <option value="trialing">Trial</option>
                <option value="past_due">Past Due</option>
                <option value="canceled">Canceled</option>
              </select>
            </div>
            <div class="row">
              <div class="col-6 mb-3">
                <label class="form-label">Signals/Day</label>
                <input type="number" class="form-control" id="sub-signals" />
              </div>
              <div class="col-6 mb-3">
                <label class="form-label">Max Portfolios</label>
                <input type="number" class="form-control" id="sub-portfolios" />
              </div>
            </div>
            <div class="row">
              <div class="col-6 mb-3">
                <label class="form-label">Max Strategies</label>
                <input type="number" class="form-control" id="sub-strategies" />
              </div>
            </div>
            <div class="mb-3">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="sub-realtime" />
                <label class="form-check-label">Realtime Signals</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="sub-backtest" />
                <label class="form-check-label">Backtesting</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="sub-api" />
                <label class="form-check-label">API Access</label>
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" id="save-btn">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../../dist/js/tabler.min.js"></script>
  <script>
    const API_BASE = '/api/admin/subscriptions';

    async function fetchJSON(url, opts = {}) {
      try { const res = await fetch(url, opts); if (!res.ok) throw new Error(res.status); return await res.json(); } 
      catch (e) { console.error(e); return null; }
    }

    async function loadStats() {
      const stats = await fetchJSON('/api/admin/subscription-stats');
      if (stats) {
        document.getElementById('stat-total').textContent = stats.total || 0;
        document.getElementById('stat-active').textContent = stats.active || 0;
        document.getElementById('stat-trial').textContent = stats.trial || 0;
        document.getElementById('stat-past-due').textContent = stats.past_due || 0;
      }
    }

    async function loadSubs() {
      const data = await fetchJSON(API_BASE);
      const tbody = document.getElementById('subs-tbody');
      if (!data || !data.length) { tbody.innerHTML = '<tr><td colspan="8" class="text-center py-4">No subscriptions found</td></tr>'; return; }
      
      tbody.innerHTML = data.map(s => `
        <tr>
          <td>${s.id}</td>
          <td>${s.user_id}</td>
          <td><span class="badge bg-${s.tier === 'enterprise' ? 'dark' : s.tier === 'pro' ? 'primary' : s.tier === 'basic' ? 'info' : 'secondary'}">${s.tier}</span></td>
          <td><span class="badge bg-${s.status === 'active' ? 'success' : s.status === 'trialing' ? 'info' : s.status === 'past_due' ? 'warning' : 'light'}">${s.status}</span></td>
          <td>${s.signals_per_day}</td>
          <td>
            ${s.realtime_signals ? '<span class="badge bg-success-lt me-1">RT</span>' : ''}
            ${s.backtesting ? '<span class="badge bg-info-lt me-1">BT</span>' : ''}
            ${s.api_access ? '<span class="badge bg-warning-lt me-1">API</span>' : ''}
          </td>
          <td>${new Date(s.created_at).toLocaleDateString()}</td>
          <td><button class="btn btn-sm btn-outline-primary" onclick="editSub(${s.id}, '${s.tier}', '${s.status}', ${s.signals_per_day}, ${s.max_portfolios}, ${s.max_strategies}, ${s.realtime_signals}, ${s.backtesting}, ${s.api_access})">Edit</button></td>
        </tr>
      `).join('');
    }

    function editSub(id, tier, status, signals, portfolios, strategies, realtime, backtest, api) {
      document.getElementById('sub-id').value = id;
      document.getElementById('sub-tier').value = tier;
      document.getElementById('sub-status').value = status;
      document.getElementById('sub-signals').value = signals;
      document.getElementById('sub-portfolios').value = portfolios;
      document.getElementById('sub-strategies').value = strategies;
      document.getElementById('sub-realtime').checked = realtime;
      document.getElementById('sub-backtest').checked = backtest;
      document.getElementById('sub-api').checked = api;
      new bootstrap.Modal(document.getElementById('subModal')).show();
    }

    document.getElementById('save-btn').addEventListener('click', async () => {
      const id = document.getElementById('sub-id').value;
      const data = {
        tier: document.getElementById('sub-tier').value,
        status: document.getElementById('sub-status').value,
        signals_per_day: parseInt(document.getElementById('sub-signals').value),
        max_portfolios: parseInt(document.getElementById('sub-portfolios').value),
        max_strategies: parseInt(document.getElementById('sub-strategies').value),
        realtime_signals: document.getElementById('sub-realtime').checked,
        backtesting: document.getElementById('sub-backtest').checked,
        api_access: document.getElementById('sub-api').checked
      };
      const res = await fetchJSON(`${API_BASE}/${id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
      if (res) { bootstrap.Modal.getInstance(document.getElementById('subModal')).hide(); loadSubs(); }
    });

    loadStats(); loadSubs();
  </script>
</body>
</html>
