---
apiVersion: v1
kind: ConfigMap
metadata:
  name: stock-python-config
  labels:
    app: stock-python
data:
  # Project
  PROJECT_NAME: "Stock API"
  DEBUG: "false"
  VERSION: "1.0.0"

  # Server
  HOST: "0.0.0.0"
  PUBLIC_API_PORT: "8000"
  ADMIN_API_PORT: "8001"

  # CORS
  ALLOWED_ORIGINS: "https://app.stockpy.com,https://admin.stockpy.com"

  # Database (reference secret for credentials)
  DATABASE_URL: "postgresql+asyncpg://stock_user:stock_password@postgres:5432/stock_db"

  # Redis
  REDIS_URL: "redis://redis:6379/0"

  # Celery
  CELERY_BROKER_URL: "redis://redis:6379/1"
  CELERY_RESULT_BACKEND: "redis://redis:6379/1"

  # Rate Limiting
  RATE_LIMIT_PER_MINUTE: "60"

  # JWT (use secret for key)
  ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"

  # Email (Resend)
  RESEND_API_KEY: ""

  # Email (AWS SES)
  AWS_REGION: "us-east-1"

  # Email settings
  EMAIL_FROM: "StockPy <noreply@stockpy.com>"
  EMAIL_FROM_NAME: "StockPy"

  # WebPush (VAPID keys)
  WEB_PUSH_SUBJECT: "mailto:admin@stockpy.com"