---
# Public API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: public-api
  labels:
    app: stock-python
    component: api
    tier: public
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stock-python
      component: public-api
  template:
    metadata:
      labels:
        app: stock-python
        component: public-api
    spec:
      containers:
        - name: public-api
          image: stock-python:latest
          command: ["uvicorn", "apps.public_api.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: stock-python-config
            - secretRef:
                name: stock-python-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
# Admin API Deployment
apiVersion: apps/v1
