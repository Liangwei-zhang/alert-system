---
# Celery Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  labels:
    app: stock-python
    component: worker
    task: celery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stock-python
      component: celery-worker
  template:
    metadata:
      labels:
        app: stock-python
        component: celery-worker
    spec:
      containers:
        - name: celery-worker
          image: stock-python:latest
          command: ["celery", "-A", "apps.workers.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
          envFrom:
            - configMapRef:
                name: stock-python-config
            - secretRef:
                name: stock-python-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
