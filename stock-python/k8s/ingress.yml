---
# Ingress for Public API
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stock-python-ingress
  labels:
    app: stock-python
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: api.stockpy.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: public-api
                port:
                  number: 80
---
# Ingress for Admin API
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stock-python-admin-ingress
  labels:
    app: stock-python
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: stock-python-admin-auth
spec:
  ingressClassName: nginx
  rules:
    - host: admin.stockpy.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-api
                port:
                  number: 80
---
# Ingress for Flower Monitoring
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stock-python-flower-ingress
  labels:
    app: stock-python
  annotations:
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: stock-python-admin-auth
spec:
  ingressClassName: nginx
  rules:
    - host: flower.stockpy.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: flower
                port:
                  number: 80