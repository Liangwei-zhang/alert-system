---
apiVersion: v1
kind: Secret
metadata:
  name: stock-python-secrets
  labels:
    app: stock-python
type: Opaque
stringData:
  # Database
  DATABASE_URL: "postgresql+asyncpg://stock_user:CHANGEME@postgres:5432/stock_db"

  # JWT
  SECRET_KEY: "CHANGE-ME-IN-PRODUCTION-generate-with-openssl-rand-hex-32"

  # Redis
  REDIS_URL: "redis://:CHANGEME@redis:6379/0"
  CELERY_BROKER_URL: "redis://:CHANGEME@redis:6379/1"
  CELERY_RESULT_BACKEND: "redis://:CHANGEME@redis:6379/1"

  # Email (Resend)
  RESEND_API_KEY: "re_CHANGEME"

  # Email (AWS SES)
  AWS_ACCESS_KEY_ID: "CHANGEME"
  AWS_SECRET_ACCESS_KEY: "CHANGEME"

  # WebPush (VAPID keys - generate with webpush module)
  WEB_PUSH_PUBLIC_KEY: "CHANGEME"
  WEB_PUSH_PRIVATE_KEY: "CHANGEME"

  # PostgreSQL
  POSTGRES_USER: "stock_user"
  POSTGRES_PASSWORD: "CHANGEME-strong-password"

  # Redis Auth
  REDIS_PASSWORD: "CHANGEME-strong-password"