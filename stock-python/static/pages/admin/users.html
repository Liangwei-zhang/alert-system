{% extends "admin/layout.html" %}

{% block title %}Users - Admin{% endblock %}

{% block content %}
<div class="page-header d-flex justify-content-between align-items-center mb-4">
  <h1 class="page-title">Users</h1>
  <button class="btn btn-primary" onclick="refreshUsers()">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"></path><path d="M1 20v-6h6"></path><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
    Refresh
  </button>
</div>

<div class="card mb-3">
  <div class="card-body">
    <div class="row g-3">
      <div class="col-md-4">
        <input type="text" class="form-control" id="searchInput" placeholder="Search users..." onkeyup="filterTable()">
      </div>
      <div class="col-md-3">
        <select class="form-select" id="tierFilter" onchange="filterTable()">
          <option value="">All Tiers</option>
          <option value="free">Free</option>
          <option value="basic">Basic</option>
          <option value="pro">Pro</option>
          <option value="enterprise">Enterprise</option>
        </select>
      </div>
      <div class="col-md-3">
        <select class="form-select" id="statusFilter" onchange="filterTable()">
          <option value="">All Status</option>
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
          <option value="suspended">Suspended</option>
        </select>
      </div>
    </div>
  </div>
</div>

<div class="card">
  <div class="table-responsive">
    <table class="table card-table table-vcenter" id="usersTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Email</th>
          <th>Name</th>
          <th>Tier</th>
          <th>Status</th>
          <th>Created</th>
          <th>Last Login</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="usersTableBody">
        <tr><td colspan="8" class="text-center text-muted py-4">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
let usersData = [];

async function loadUsers() {
  try {
    const resp = await fetch('/api/v1/admin/users');
    const data = await resp.json();
    usersData = data.users || data || [];
    renderUsers();
  } catch (e) {
    document.getElementById('usersTableBody').innerHTML = '<tr><td colspan="8" class="text-danger py-4">Failed to load users</td></tr>';
  }
}

function renderUsers() {
  const tbody = document.getElementById('usersTableBody');
  if (!usersData.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="text-muted py-4">No users found</td></tr>';
    return;
  }
  tbody.innerHTML = usersData.map(u => `
    <tr>
      <td><code>${u.id || ''}</code></td>
      <td>${u.email || ''}</td>
      <td>${u.name || ''}</td>
      <td><span class="badge badge-tier bg-${u.tier === 'pro' ? 'info' : u.tier === 'enterprise' ? 'warning' : u.tier === 'basic' ? 'success' : 'secondary'}">${u.tier || 'free'}</span></td>
      <td><span class="badge bg-${u.status === 'active' ? 'success' : u.status === 'suspended' ? 'danger' : 'secondary'}">${u.status || 'active'}</span></td>
      <td>${u.created_at ? new Date(u.created_at).toLocaleDateString() : '-'}</td>
      <td>${u.last_login ? new Date(u.last_login).toLocaleDateString() : '-'}</td>
      <td>
        <button class="btn btn-sm btn-outline-secondary" onclick="editUser('${u.id}')">Edit</button>
      </td>
    </tr>
  `).join('');
}

function filterTable() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const tier = document.getElementById('tierFilter').value;
  const status = document.getElementById('statusFilter').value;
  
  const filtered = usersData.filter(u => {
    const matchSearch = !search || (u.email || '').toLowerCase().includes(search) || (u.name || '').toLowerCase().includes(search);
    const matchTier = !tier || u.tier === tier;
    const matchStatus = !status || u.status === status;
    return matchSearch && matchTier && matchStatus;
  });
  
  const tbody = document.getElementById('usersTableBody');
  tbody.innerHTML = filtered.length ? filtered.map(u => `
    <tr>
      <td><code>${u.id || ''}</code></td>
      <td>${u.email || ''}</td>
      <td>${u.name || ''}</td>
      <td><span class="badge badge-tier bg-${u.tier === 'pro' ? 'info' : u.tier === 'enterprise' ? 'warning' : u.tier === 'basic' ? 'success' : 'secondary'}">${u.tier || 'free'}</span></td>
      <td><span class="badge bg-${u.status === 'active' ? 'success' : u.status === 'suspended' ? 'danger' : 'secondary'}">${u.status || 'active'}</span></td>
      <td>${u.created_at ? new Date(u.created_at).toLocaleDateString() : '-'}</td>
      <td>${u.last_login ? new Date(u.last_login).toLocaleDateString() : '-'}</td>
      <td><button class="btn btn-sm btn-outline-secondary" onclick="editUser('${u.id}')">Edit</button></td>
    </tr>
  `).join('') : '<tr><td colspan="8" class="text-muted py-4">No matching users</td></tr>';
}

function refreshUsers() { loadUsers(); }
function editUser(id) { alert('Edit user: ' + id); }

loadUsers();
</script>
{% endblock %}
