<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />
  <title>Setup - Stock Py</title>
  <link href="../dist/css/tabler.css" rel="stylesheet" />
  <link href="../dist/css/tabler-flags.css" rel="stylesheet" />
  <style>
    @import url("https://rsms.me/inter/inter.css");
    body { background: #f8f9fa; }
    .step-indicator { display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; }
    .step-dot { width: 10px; height: 10px; border-radius: 50%; background: #e9ecef; }
    .step-dot.active { background: #066fd1; }
  </style>
</head>
<body>
  <div class="page">
    <div class="container container-tight py-4">
      <div class="text-center mb-4">
        <h1 class="mb-1">📈 Stock Py</h1>
        <p class="text-muted">Let's set up your portfolio</p>
      </div>

      <div class="step-indicator">
        <div class="step-dot active"></div>
        <div class="step-dot active"></div>
        <div class="step-dot active"></div>
      </div>

      <div class="card card-md">
        <div class="card-body">
          <h2 class="h4 mb-4">Step 3: Cash Balance</h2>
          <p class="text-muted mb-3">How much cash do you have available?</p>
          
          <form id="setupForm" method="post" action="/api/setup">
            <input type="hidden" name="step" value="3" />
            
            <div class="mb-3">
              <label class="form-label">Cash Available</label>
              <div class="input-group">
                <span class="input-group-text">$</span>
                <input type="number" name="cash" class="form-control" 
                       placeholder="10000" min="0" step="0.01" />
              </div>
            </div>

            <div class="d-flex gap-2">
              <a href="setup2.html" class="btn btn-secondary">Back</a>
              <button type="submit" class="btn btn-success flex-grow-1">Complete Setup</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('setupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const cash = parseFloat(formData.get('cash')) || 0;
      
      try {
        const res = await fetch('/api/setup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ step: 3, cash })
        });
        if (res.ok) {
          window.location.href = 'mobile.html';
        } else {
          alert('Failed to save. Please try again.');
        }
      } catch (err) {
        alert('Error saving cash balance.');
      }
    });
  </script>
</body>
</html>
